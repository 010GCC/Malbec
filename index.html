<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MALBEC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Chakra+Petch:wght@400;600;700&family=Orbitron:wght@900&family=Rubik+Distressed&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    overscroll-behavior: none;
  }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Chakra Petch', sans-serif;
    color: #e8e8ec;
  }
  #gameCanvas {
    display: block;
    pointer-events: none;
  }
  body.at-title #hud { visibility: hidden; }
  #ui {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 14px 18px;
    pointer-events: none;
  }
  #hud-left { display: flex; flex-direction: column; gap: 6px; }
  #health-bar-wrap {
    display: flex; align-items: center; gap: 8px;
  }
  #health-bar-bg {
    width: 160px; height: 8px;
    background: rgba(255,255,255,0.12);
    border-radius: 4px;
    overflow: hidden;
  }
  #health-bar-fill {
    height: 100%;
    background: #e03c3c;
    border-radius: 4px;
    transition: width 0.1s;
    width: 100%;
  }
  #hearts-row {
    display: flex; gap: 4px; align-items: center;
  }
  .heart {
    font-size: 13px;
    filter: grayscale(1) brightness(0.4);
    transition: filter 0.2s;
  }
  .heart.active { filter: none; }
  #score-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
  }
  #gem-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: rgba(100,220,255,0.8);
    letter-spacing: 1px;
    margin-top: 2px;
  }
  #hud-right {
    text-align: right;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    line-height: 1.7;
  }
  #level-label {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  /* Overlay screens */
  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    transition: opacity 0.6s;
    pointer-events: auto;
    touch-action: manipulation;
    z-index: 50;
  }
  .overlay.hidden { display: none; }
  #title-screen {
    background: transparent;
    justify-content: flex-end;
    padding-bottom: 10%;
  }
  #title-screen .sub {
    position: absolute;
    top: 52%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .start-btn {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    padding: 12px 40px;
    border: 1px solid rgba(255,255,255,0.25);
    background: transparent;
    color: #fff;
    cursor: pointer;
    text-transform: uppercase;
    transition: border-color 0.2s, background 0.2s;
    pointer-events: auto;
    touch-action: manipulation;
    -webkit-tap-highlight-color: rgba(255,255,255,0.1);
  }
  .start-btn:hover {
    border-color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.06);
  }
  #controls-hint {
    position: absolute;
    bottom: 24px;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.2);
    text-align: center;
    line-height: 2;
  }
  #gameover-screen { background: rgba(0,0,0,0.95); }
  #gameover-screen h2 {
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 700;
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }
  #gameover-screen .score-final {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 48px;
    letter-spacing: 3px;
  }
  #dim-flash {
    position: absolute;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
  }
  #dim-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Chakra Petch', sans-serif;
    font-size: clamp(1.2rem, 4vw, 2.5rem);
    font-weight: 700;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 0 20px rgba(255,255,255,0.5);
    opacity: 0;
    pointer-events: none;
    z-index: 18;
    text-transform: uppercase;
    text-align: center;
  }
  #world-name-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'Chakra Petch', sans-serif;
    font-size: clamp(2rem, 7vw, 5rem);
    font-weight: 700;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.08);
    pointer-events: none;
    z-index: 1;
    white-space: nowrap;
    text-transform: uppercase;
  }
  #boss-warning {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Chakra Petch', sans-serif;
    font-size: clamp(1.5rem, 5vw, 3rem);
    font-weight: 700;
    letter-spacing: 0.3em;
    color: #e03c3c;
    text-shadow: 0 0 30px rgba(224,60,60,0.8);
    opacity: 0;
    pointer-events: none;
    z-index: 15;
    text-transform: uppercase;
  }
  #invincibility-bar {
    position: absolute;
    top: 60px; left: 18px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  #invincibility-bar .inv-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: #f5c842;
    text-transform: uppercase;
  }
  #inv-bar-bg {
    width: 100px; height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
  }
  #inv-bar-fill {
    height: 100%;
    background: #f5c842;
    border-radius: 2px;
    transition: width 0.1s;
  }
  /* Touch controls */
  #touch-controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 150px;
    z-index: 40;
    display: none;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 12px 16px;
    pointer-events: none;
  }
  #touch-controls.tc-active { display: flex; pointer-events: none; }
  .tc-cluster { display: flex; gap: 6px; align-items: flex-end; pointer-events: auto; }
  .tc-col { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .tc-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(255,255,255,0.10);
    border: 1.5px solid rgba(255,255,255,0.28);
    color: rgba(255,255,255,0.75);
    font-family: 'Chakra Petch', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    display: flex; align-items: center; justify-content: center;
    pointer-events: auto;
    cursor: pointer;
    transition: background 0.05s, border-color 0.05s;
    -webkit-tap-highlight-color: transparent;
  }
  .tc-btn.tc-jump { width: 67px; height: 67px; font-size: 11px; border-color: rgba(255,255,255,0.45); }
  .tc-btn.tc-atk  {
    width: 100px; height: 52px;
    border-radius: 14px;
    font-size: 13px;
    letter-spacing: 2px;
    border-color: rgba(255,120,80,0.7);
    color: rgba(255,160,110,0.95);
  }
  .tc-btn.tc-pressed {
    background: rgba(255,255,255,0.28);
    border-color: rgba(255,255,255,0.8);
  }
  /* Orientation warning */
  #orient-warn {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    font-size: 14px;
    letter-spacing: 2px;
    text-align: center;
    padding: 32px;
    color: rgba(255,255,255,0.6);
  }
  #orient-warn .big { font-size: 32px; margin-bottom: 8px; }
  .phone-wrap {
    width: 80px; height: 80px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 8px;
    animation: phone-rotate 2s ease-in-out infinite;
  }
  @keyframes phone-rotate {
    0%   { transform: rotate(0deg); }
    40%  { transform: rotate(0deg); }
    65%  { transform: rotate(90deg); }
    90%  { transform: rotate(90deg); }
    100% { transform: rotate(0deg); }
  }
  .phone-body {
    width: 32px; height: 56px;
    border: 3px solid rgba(255,255,255,0.75);
    border-radius: 7px;
    position: relative;
    background: rgba(255,255,255,0.05);
  }
  .phone-body::before {
    content: '';
    position: absolute;
    top: 5px; left: 50%; transform: translateX(-50%);
    width: 10px; height: 3px;
    background: rgba(255,255,255,0.4);
    border-radius: 2px;
  }
  .phone-body::after {
    content: '';
    position: absolute;
    bottom: 5px; left: 50%; transform: translateX(-50%);
    width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 50%;
  }
  @media (orientation: portrait) {
    #orient-warn { display: flex; }
  }
</style>
</head>
<body class="at-title">

<canvas id="gameCanvas"></canvas>

<div id="ui">
  <!-- HUD -->
  <div id="hud">
    <div id="hud-left">
      <div id="health-bar-wrap">
        <div id="health-bar-bg"><div id="health-bar-fill"></div></div>
        <span id="hp-pct" style="font-size:11px;font-family:'Share Tech Mono',monospace;color:rgba(255,255,255,0.5);letter-spacing:1px;">100%</span>
      </div>
      <div id="hearts-row"></div>
      <div id="score-display">SCORE: <span id="score-val">0</span></div>
      <div id="gem-display">&#9671; <span id="gem-val">0</span></div>
    </div>
    <div id="world-name-display"></div>
    <div id="hud-right">
      <div id="level-label">LEVEL 1</div>
      <div id="timer-display">0:00</div>
    </div>
  </div>

  <!-- Invincibility bar -->
  <div id="invincibility-bar">
    <span class="inv-label">INVINCIBLE</span>
    <div id="inv-bar-bg"><div id="inv-bar-fill" style="width:100%"></div></div>
  </div>

  <!-- Boss warning -->
  <div id="boss-warning"></div>

  <!-- Dimensional room flash -->
  <div id="dim-flash"></div>
  <div id="dim-label"></div>

</div>

<!-- Overlays outside #ui so pointer-events work on mobile -->
<div class="overlay" id="title-screen">
  <p class="sub">A World That Has Never Existed Before</p>
  <button class="start-btn" id="start-btn">ENTER</button>
</div>

<div class="overlay hidden" id="gameover-screen">
  <h2 id="gameover-title">THE WORLD ENDS</h2>
  <p class="score-final">FINAL SCORE: <span id="final-score">0</span></p>
  <button class="start-btn" id="restart-btn">AGAIN</button>
</div>

<!-- Touch controls -->
<div id="touch-controls">
  <!-- Left: movement -->
  <div class="tc-cluster">
    <button class="tc-btn" id="tc-left">◀</button>
    <div class="tc-col">
      <button class="tc-btn" id="tc-up">▲</button>
      <button class="tc-btn" id="tc-down">▼</button>
    </div>
    <button class="tc-btn" id="tc-right">▶</button>
  </div>
  <!-- Right: actions -->
  <div class="tc-cluster">
    <button class="tc-btn tc-jump" id="tc-jump">JUMP</button>
    <div class="tc-col">
      <button class="tc-btn tc-atk" id="tc-atk">ATK</button>
      <button class="tc-btn" id="tc-dash">DSH</button>
    </div>
    <div class="tc-col">
      <button class="tc-btn" id="tc-evade">EVD</button>
    </div>
  </div>
</div>

<!-- Orientation warning -->
<div id="orient-warn">
  <div class="phone-wrap"><div class="phone-body"></div></div>
  <div>ROTATE YOUR DEVICE</div>
  <div style="font-size:11px;opacity:0.4;">LANDSCAPE ONLY</div>
</div>

<script>
// ─────────────────────────────────────────────
//  MALBEC — v1.6.0
//  Soluniplabs | Built from GDD v1.0
// ─────────────────────────────────────────────
const VERSION = '1.6.3';

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ── Resize ──────────────────────────────────
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── Constants ───────────────────────────────
const TILE = 64;
const GRAVITY = 1400;
const PLAYER_SPEED = 280;
const JUMP_FORCE = -580;
const DASH_FORCE = 520;
const DASH_DURATION = 0.18;
const FLOOR_Y = () => canvas.height - TILE * 1.5;
const ENEMY_CONTACT_DMG = 5; // % per contact trigger
const SPIKE_DMG = 2; // % per second
const WORLD_SCROLL_SPEED = 220;
const BULLET_SPEED = 620;
const GUN_DEFS = {
  particle_blaster: { ammo: Infinity, cooldown: 0.07, color: '#ff88ff', label: 'BLASTER',       dmg: 1 },
  scatter:          { ammo: 18,       cooldown: 0.40, color: '#ff6600', label: 'SCATTER',        dmg: 1 },
  railgun:          { ammo: 7,        cooldown: 0.75, color: '#ffff44', label: 'RAILGUN',        dmg: 99 },
  homing_spread:    { ammo: 20,       cooldown: 0.45, color: '#ff44ff', label: 'SEEKER',         dmg: 1 },
};
const GLITTER = ['#ff77ff','#77ffff','#ffff77','#ff99cc','#99ffcc','#ccaaff','#ffaacc'];

// ── World Identity ───────────────────────────
const CHARACTERISTICS = [
  'Bone','Iron','Coral','Obsidian','Moss','Crystal',
  'Ash','Gold','Shadow','Ember','Tide','Storm','Rust','Bloom'
];
const CHAR_PALETTES = {
  Bone:    { ground:'#d4c9a8', platform:'#c9bfa0', mid:'#b8a88a', sky:'#2a2520', bg:'#1a1510', accent:'#e0d4b8' },
  Iron:    { ground:'#5a6068', platform:'#4a5058', mid:'#3a4048', sky:'#1a2030', bg:'#0a1020', accent:'#8090a0' },
  Coral:   { ground:'#c06040', platform:'#d07050', mid:'#e08060', sky:'#300a0a', bg:'#1a0505', accent:'#ff9070' },
  Obsidian:{ ground:'#1a1520', platform:'#0f0a15', mid:'#252030', sky:'#0a0810', bg:'#050508', accent:'#6040a0' },
  Moss:    { ground:'#3a5a2a', platform:'#4a6a3a', mid:'#2a4a20', sky:'#0a1508', bg:'#050a03', accent:'#70b050' },
  Crystal: { ground:'#6080b0', platform:'#7090c0', mid:'#5070a0', sky:'#0a1530', bg:'#050a1a', accent:'#a0d0ff' },
  Ash:     { ground:'#6a6a6a', platform:'#5a5a5a', mid:'#4a4a4a', sky:'#1a1a1a', bg:'#0d0d0d', accent:'#aaaaaa' },
  Gold:    { ground:'#c09020', platform:'#d0a030', mid:'#b08010', sky:'#1a1000', bg:'#0d0800', accent:'#ffd040' },
  Shadow:  { ground:'#1a1a2a', platform:'#15152a', mid:'#101020', sky:'#080810', bg:'#030308', accent:'#4040a0' },
  Ember:   { ground:'#8a2010', platform:'#aa3020', mid:'#601008', sky:'#200500', bg:'#0f0200', accent:'#ff6020' },
  Tide:    { ground:'#20507a', platform:'#306090', mid:'#104060', sky:'#05101a', bg:'#020810', accent:'#40a0d0' },
  Storm:   { ground:'#4a4a6a', platform:'#5a5a8a', mid:'#3a3a5a', sky:'#0d0d1a', bg:'#070710', accent:'#9090cc' },
  Rust:    { ground:'#7a3a20', platform:'#8a4a30', mid:'#6a2a10', sky:'#1a0800', bg:'#0d0400', accent:'#c06030' },
  Bloom:   { ground:'#804888', platform:'#9058a0', mid:'#603870', sky:'#150010', bg:'#0a0008', accent:'#d080e0' },
};

// ── Input ────────────────────────────────────
const Keys = { held: {}, just: {} };
document.addEventListener('keydown', e => {
  if (!Keys.held[e.code]) Keys.just[e.code] = true;
  Keys.held[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { Keys.held[e.code] = false; });
function clearJust() { Keys.just = {}; }

// ── Touch Controls (Pointer Events for true multi-touch) ─────
let attackBuffer = false;
(function() {
  const map = {
    'tc-left':  'ArrowLeft',
    'tc-right': 'ArrowRight',
    'tc-up':    'ArrowUp',
    'tc-down':  'ArrowDown',
    'tc-jump':  'Space',
    'tc-atk':   'KeyJ',
    'tc-dash':  'KeyK',
    'tc-evade': 'KeyL',
  };
  Object.entries(map).forEach(([id, code]) => {
    const el = document.getElementById(id);
    if (!el) return;
    const press = e => {
      e.preventDefault();
      el.setPointerCapture(e.pointerId);
      if (!Keys.held[code]) Keys.just[code] = true;
      Keys.held[code] = true;
      if (code === 'KeyJ') attackBuffer = true;
      el.classList.add('tc-pressed');
    };
    const release = e => {
      Keys.held[code] = false;
      el.classList.remove('tc-pressed');
    };
    el.addEventListener('pointerdown',   press,   {passive: false});
    el.addEventListener('pointerup',     release);
    el.addEventListener('pointercancel', release);
  });
})();

function updateTouchControls() {
  const tc = document.getElementById('touch-controls');
  const on = ['playing','dimensional','boss'].includes(GS.state);
  tc.classList.toggle('tc-active', on);
}

// ── Audio (procedural via Web Audio) ─────────
let audioCtx;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function sfx(freq, dur, type='square', vol=0.15, detune=0) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    osc.detune.value = detune;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch(e){}
}
function sfxJump() { sfx(300, 0.12, 'square', 0.12); }
function sfxAttack() { sfx(200, 0.08, 'sawtooth', 0.1, -200); }
function sfxHit() { sfx(120, 0.15, 'square', 0.18, -500); }
function sfxDash() { sfx(440, 0.1, 'sine', 0.08); }
function sfxHeart() { sfx(660, 0.2, 'sine', 0.14); sfx(880, 0.2, 'sine', 0.1); }
function sfxBoss() {
  sfx(80, 0.5, 'sawtooth', 0.2);
  setTimeout(() => sfx(60, 0.5, 'sawtooth', 0.2), 200);
}
function sfxBossDeath() {
  for (let i=0;i<6;i++) setTimeout(()=>sfx(100-i*10,0.3,'square',0.15),i*120);
}
function sfxBeam() {
  sfx(80, 2.5, 'sine', 0.06);
  setTimeout(()=>sfx(160, 1.5, 'sine', 0.04), 400);
}
function sfxDimEnter() {
  sfx(1200, 0.3, 'sine', 0.15);
  setTimeout(()=>sfx(900,0.3,'sine',0.1),100);
}

// ── Utils ─────────────────────────────────────
const lerp = (a,b,t) => a+(b-a)*t;
const clamp = (v,mn,mx) => Math.max(mn,Math.min(mx,v));
const rand = (a,b) => Math.random()*(b-a)+a;
const randInt = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

// ── Procedural Sprite Generator ───────────────
function genSprite(seed, w, h, palette) {
  const offscreen = document.createElement('canvas');
  offscreen.width = w; offscreen.height = h;
  const oc = offscreen.getContext('2d');
  oc.imageSmoothingEnabled = false;

  const rng = mulberry32(seed);
  const skin  = '#f0c080';
  const hair  = [palette.accent, darken(palette.accent, 0.3), '#ffffff', '#ffdd44'][Math.floor(rng()*4)];
  const armor = palette.accent;
  const dark  = darken(palette.accent, 0.4);
  const light = lighten(palette.accent, 0.3);

  // 4 cols × 12 rows drawn in a narrow band, centered in canvas
  const cols = 4, rows = 12;
  const pw = 4;              // fixed 4px column width — narrow body
  const ph = h / rows;       // fills full height
  const ox = (w - cols * pw) / 2;  // center horizontally

  function dot(gx, gy, col, sw=1, sh=1) {
    oc.fillStyle = col;
    oc.fillRect(ox + gx*pw, gy*ph, pw*sw, ph*sh);
  }

  // Hair
  dot(0,0, hair, 4, 1);
  // Head
  dot(0,1, skin, 4, 2);
  // Eyes
  oc.fillStyle = '#111';
  oc.fillRect(ox + 0.5*pw, 1.4*ph, pw*0.6, ph*0.55);
  oc.fillRect(ox + 2.9*pw, 1.4*ph, pw*0.6, ph*0.55);
  // Neck
  dot(1,3, skin, 2, 1);
  // Shoulders
  dot(0,4, armor, 4, 1);
  // Torso
  dot(0,5, armor, 4, 3);
  dot(0,5, light, 1, 3);
  dot(3,5, dark,  1, 3);
  // Belt
  dot(0,7, dark, 4, 1);
  // Arms — 1px wide each, outside body
  oc.fillStyle = armor;
  oc.fillRect(ox - pw,     4*ph, pw, 5*ph);  // L arm
  oc.fillRect(ox + 4*pw,   4*ph, pw, 5*ph);  // R arm
  oc.fillStyle = skin;
  oc.fillRect(ox - pw,     8*ph, pw, ph);    // L hand
  oc.fillRect(ox + 4*pw,   8*ph, pw, ph);    // R hand
  // Hips
  dot(0,8, armor, 4, 1);
  // Legs — 2 cols with 0-gap
  dot(0,9,  armor, 2, 3);
  dot(2,9,  armor, 2, 3);
  // Boots
  dot(0,11, dark, 2, 1);
  dot(2,11, dark, 2, 1);

  return offscreen;
}
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = t + Math.imul(t ^ (t >>> 7), 61 | t) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ── Level Generation ──────────────────────────
function generateLevel() {
  const isBoss = GS.level % 3 === 0;
  GS.bossActive = false;
  GS.platforms = [];
  GS.spikes = [];
  GS.enemies = [];
  GS.bullets = [];
  GS.weaponPickups = [];
  GS.railBeam = null;
  GS.player.gun = { type: 'particle_blaster', ammo: Infinity };
  GS.player.gunCooldown = 0;
  GS.dimDoor = null;
  GS.dimDoorActive = false;
  GS.cameraX = 0;
  GS.distanceTraveled = 0;
  GS.levelTimer = 0;
  GS.screenCracks = [];
  GS.screenDistortion = 0;
  GS.boss = null;
  GS.dimRoom.active = false;
  GS.worldReveal = 0;
  GS.worldNameFadeT = 0;

  // Generate world
  if (GS.level % 3 === 1) GS.world = generateWorld();
  const pal = GS.world.palette;

  const fw = FLOOR_Y();
  const W = canvas.width;

  // Platforms scattered across the level width
  const levelWidth = GS.distanceGoal + W;
  for (let x = W*0.4; x < levelWidth; x += randInt(180, 380)) {
    const py = fw - randInt(1,4)*TILE*0.8;
    GS.platforms.push({ x, y: py, w: randInt(80,180), h: 18, color: pal.platform });
  }

  // Spikes (not in first section)
  for (let x = W*0.7; x < levelWidth; x += randInt(300,600)) {
    GS.spikes.push({ x, y: fw - 18, w: 40, h: 18 });
  }

  // Weapon pickups — 2 random drops spaced across the level
  const gunPool = ['scatter','railgun','homing_spread'];
  const pick1 = pick(gunPool);
  let pick2 = pick(gunPool);
  while (pick2 === pick1) pick2 = pick(gunPool);
  const pu1x = W * 0.35 + rand(0, GS.distanceGoal * 0.3);
  const pu2x = GS.distanceGoal * 0.55 + rand(0, GS.distanceGoal * 0.3);
  GS.weaponPickups.push({ wx: pu1x, y: fw - 28, type: pick1, w: 26, h: 20 });
  GS.weaponPickups.push({ wx: pu2x, y: fw - 28, type: pick2, w: 26, h: 20 });

  // Dimensional room door — visible in background at ~40% of level
  if (!isBoss) {
    const doorX = GS.distanceGoal * 0.4 + rand(0, 200);
    GS.dimDoor = { x: doorX, y: fw - 70, w: 40, h: 70, pulseAlpha: 1 };
    GS.dimDoorActive = true;
  }

  // If boss level, prep enemy types first then spawn boss
  if (isBoss) {
    spawnBoss();
  }

  // Announce
  GS.announceText = isBoss ? `LEVEL ${GS.level} — BOSS` : `LEVEL ${GS.level}`;
  GS.announceAlpha = 1.5;

  updateHUD();
}

function spawnBoss() {

// ── Particle System ───────────────────────────
function spawnParticles(x, y, count, cfg) {
  for (let i=0;i<count;i++) {
    const angle = rand(0, Math.PI*2);
    const speed = rand(cfg.speedMin||50, cfg.speedMax||200);
    GS.particles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - (cfg.upBias||0),
      life: rand(cfg.lifeMin||0.3, cfg.lifeMax||0.8),
      maxLife: 0,
      color: cfg.color || '#ffffff',
      size: rand(cfg.sizeMin||2, cfg.sizeMax||6),
      active: true,
    });
    GS.particles[GS.particles.length-1].maxLife = GS.particles[GS.particles.length-1].life;
  }
}

// ── HUD Update ────────────────────────────────
function updateHUD() {
  const p = GS.player;
  // Health
  document.getElementById('health-bar-fill').style.width = clamp(p.hp,0,100)+'%';
  document.getElementById('hp-pct').textContent = Math.ceil(p.hp)+'%';
  // Hearts — always 11 slots, prestige cycles
  const hr = document.getElementById('hearts-row');
  hr.innerHTML = '';
  const safeHearts = Math.max(1, p.hearts);
  const cyclePos = ((safeHearts - 1) % 11) + 1;
  const prestige = Math.floor((safeHearts - 1) / 11);
  for (let i = 0; i < 11; i++) {
    const h = document.createElement('span');
    h.className = 'heart' + (i < cyclePos ? ' active' : '');
    h.textContent = '♥';
    hr.appendChild(h);
  }
  if (prestige > 0) {
    const badge = document.createElement('span');
    badge.style.cssText = 'font-size:9px;font-family:Share Tech Mono,monospace;color:rgba(255,200,80,0.7);margin-left:5px;letter-spacing:1px;';
    badge.textContent = '\u00d7' + prestige;
    hr.appendChild(badge);
  }
  // Score + gems
  document.getElementById('score-val').textContent = GS.score.toLocaleString();
  document.getElementById('gem-val').textContent = GS.gems;
  document.getElementById('level-label').textContent = `LEVEL ${GS.level}`;
  // World name
  document.getElementById('world-name-display').textContent = GS.world.name;
  // Invincibility
  const invBar = document.getElementById('invincibility-bar');
  if (p.isGold && p.invBudget > 0) {
    invBar.style.display = 'flex';
    document.getElementById('inv-bar-fill').style.width = (p.invBudget/p.invMax*100)+'%';
  } else {
    invBar.style.display = 'none';
  }
}

// ── Player Update ─────────────────────────────
function updatePlayer(dt) {
  const p = GS.player;
  const fw = FLOOR_Y();
  const W = canvas.width;
  const H = canvas.height;

  // Timers
  if (p.attackTimer > 0) p.attackTimer -= dt;
  if (p.dashCooldown > 0) p.dashCooldown -= dt;
  if (p.evadeTimer > 0) p.evadeTimer -= dt;
  if (p.slideTimer > 0) p.slideTimer -= dt;
  if (p.flashTimer > 0) p.flashTimer -= dt;


  // Dash
  if (p.isDashing) {
    p.dashTime -= dt;
    if (p.dashTime <= 0) {
      p.isDashing = false;
      p.vx *= 0.3;
    } else {
      p.vx = p.dashDirX * DASH_FORCE;
      p.vy = 0;
    }
  } else {
    // Horizontal movement
    const left  = Keys.held['KeyA'] || Keys.held['ArrowLeft'];
    const right = Keys.held['KeyD'] || Keys.held['ArrowRight'];
    const down  = Keys.held['KeyS'] || Keys.held['ArrowDown'];

    const up = Keys.held['ArrowUp'];

    if (left)  { p.vx = lerp(p.vx, -PLAYER_SPEED, 0.35); p.facing = -1; }
    if (right) { p.vx = lerp(p.vx,  PLAYER_SPEED, 0.35); p.facing =  1; }
    if (!left && !right) { p.vx = lerp(p.vx, 0, 0.3); }

    // UP while airborne: straighten horizontal drift toward zero
    if (up && !p.isGrounded && !left && !right) {
      p.vx = lerp(p.vx, 0, 0.12);
    }

    // Jump — Space or W only; ArrowUp is reserved for doors and air-correction
    if ((Keys.just['KeyW'] || Keys.just['Space']) && p.jumpsLeft > 0) {
      p.vy = JUMP_FORCE * (p.jumpsLeft === 1 ? 0.85 : 1);
      p.jumpsLeft--;
      sfxJump();
      spawnParticles(p.x+p.w/2, p.y+p.h, 6, {color:GS.world.palette.accent,speedMin:30,speedMax:120,lifeMin:0.2,lifeMax:0.5,sizeMin:2,sizeMax:4,upBias:100});
    }

    // Dash
    if ((Keys.just['KeyK'] || Keys.just['ShiftLeft']) && p.dashCooldown <= 0) {
      p.isDashing = true;
      p.dashTime = DASH_DURATION;
      p.dashDirX = (left ? -1 : right ? 1 : p.facing);
      p.dashCooldown = 0.7;
      sfxDash();
      spawnParticles(p.x+p.w/2, p.y+p.h/2, 8, {color:'#ffffff',speedMin:20,speedMax:100,lifeMin:0.1,lifeMax:0.3,sizeMin:1,sizeMax:3});
    }

    // Fire gun
    if (p.gunCooldown > 0) p.gunCooldown -= dt;
    const pbChase = GS.player.gun?.type === 'particle_blaster' && (Keys.held['KeyJ'] || Keys.held['KeyZ']);
    if (Keys.just['KeyJ'] || Keys.just['KeyZ'] || attackBuffer || pbChase) {
      attackBuffer = false;
      fireGun();
    }

    // Evade
    if (Keys.just['KeyL'] || Keys.just['KeyX']) {
      p.isEvading = true;
      p.evadeTimer = 0.4;
      p.flashTimer = 0.4;
      p.vy = -200;
      sfxDash();
    }

    // Slide timer
    if (p.slideTimer <= 0) p.isSliding = false;
  }

  // Evade finish
  if (p.evadeTimer <= 0) p.isEvading = false;

  // Gravity
  if (!p.isDashing) {
    p.vy += GRAVITY * dt;
  }

  // Move
  p.x += p.vx * dt;
  p.y += p.vy * dt;

  // Clamp to screen left
  const screenLeft = GS.cameraX - W*0.05;
  if (p.x < screenLeft) { p.x = screenLeft; p.vx = 0; }
  // Don't go too far ahead
  const screenRight = GS.cameraX + W * 0.7;
  if (p.x > screenRight) { p.x = screenRight; p.vx = 0; }

  // Floor collision
  p.isGrounded = false;
  p.onFloor = false;
  if (p.y + p.h >= fw) {
    p.y = fw - p.h;
    p.vy = 0;
    p.isGrounded = true;
    p.onFloor = true;
    p.jumpsLeft = 2;
  }

  // Platform collisions (one-way: jump through from below, land on top)
  for (const pl of GS.platforms) {
    if (p.x + p.w > pl.x && p.x < pl.x + pl.w &&
        p.vy >= 0 &&
        p.y + p.h > pl.y && p.y + p.h < pl.y + pl.h + Math.max(20, p.vy * 0.05 + 4)) {
      p.y = pl.y - p.h;
      p.vy = 0;
      p.isGrounded = true;
      p.jumpsLeft = 2;
    }
  }

  // Spike collision (if grounded)
  if (p.isGrounded && !p.isGold && !p.isEvading) {
    for (const sp of GS.spikes) {
      const wx = sp.x - GS.cameraX;
      if (p.x + p.w > wx + 4 && p.x < wx + sp.w - 4 &&
          Math.abs((p.y + p.h) - sp.y) < 12) {
        takeDamage(SPIKE_DMG * dt);
      }
    }
  }

  // Ceiling
  if (p.y < 0) { p.y = 0; p.vy = 0; }

  // Attack hitbox expiry
  if (p.attackTimer <= 0) p.attackHitbox = null;
}

// ── Damage ─────────────────────────────────────
function takeDamage(pct) {
  const p = GS.player;
  if (p.flashTimer > 0.15) return; // i-frames

  if (p.isGold && p.invBudget > 0) {
    p.invBudget = Math.max(0, p.invBudget - pct);
    if (p.invBudget <= 0) { p.isGold = false; }
    updateHUD(); return;
  }

  p.hp -= pct;
  p.flashTimer = 0.5;
  sfxHit();

  if (p.hp <= 0) {
    p.hp = 0;
    p.hearts--;
    if (p.hearts <= 0) {
      triggerGameOver();
    } else {
      p.hp = 100;
      spawnParticles(p.x+p.w/2, p.y, 20, {color:'#e03c3c',speedMin:80,speedMax:300,lifeMin:0.4,lifeMax:1.0,sizeMin:3,sizeMax:8});
    }
  }
  updateHUD();
}

// ── Camera ────────────────────────────────────
function updateCamera(dt) {
  if (GS.state === 'dimensional' || GS.state === 'boss') return;
  const p = GS.player;
  const target = p.x - canvas.width * 0.35;
  GS.cameraX = lerp(GS.cameraX, Math.max(0, target), 0.08);
  GS.distanceTraveled = GS.cameraX;
}

// ── Gun System ─────────────────────────────────
function sfxShoot(type) {
  const ctx2 = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx2.createOscillator();
  const g = ctx2.createGain();
  o.connect(g); g.connect(ctx2.destination);
  if (type === 'particle_blaster') { o.frequency.setValueAtTime(1400,0); o.frequency.exponentialRampToValueAtTime(700,0.06); g.gain.setValueAtTime(0.05,0); g.gain.exponentialRampToValueAtTime(0.001,0.09); o.type = 'sine'; }
  else if (type === 'railgun')     { o.frequency.setValueAtTime(220,0); o.frequency.exponentialRampToValueAtTime(880,0.05); g.gain.setValueAtTime(0.3,0); g.gain.exponentialRampToValueAtTime(0.001,0.25); o.type = 'sawtooth'; }
  else                             { o.frequency.setValueAtTime(440,0); o.frequency.exponentialRampToValueAtTime(110,0.12); g.gain.setValueAtTime(0.12,0); g.gain.exponentialRampToValueAtTime(0.001,0.15); o.type = 'sawtooth'; }
  o.start(); o.stop(ctx2.currentTime + 0.3);
}

function spawnBullet(wx, y, vx, vy, gunType, bounces) {
  const def = GUN_DEFS[gunType];
  GS.bullets.push({ wx, y, vx, vy, gunType, bounces: bounces||0, alive: true, age: 0, dmg: def.dmg, startWx: wx });
}

function fireGun() {
  const p = GS.player;
  if (!p.gun) return;
  const def = GUN_DEFS[p.gun.type];
  if (p.gunCooldown > 0) return;
  if (p.gun.ammo <= 0) { p.gun = null; return; }
  p.gunCooldown = def.cooldown;
  if (p.gun.ammo !== Infinity) p.gun.ammo--;

  const dimOffset = GS.state === 'dimensional' ? GS.cameraX : 0;
  const bx = p.x + dimOffset + (p.facing > 0 ? p.w + 2 : -4);
  const by = p.y + p.h * 0.4;
  const dir = p.facing;
  const t = p.gun.type;

  if (t === 'particle_blaster') {
    spawnBullet(bx, by, dir * BULLET_SPEED * 0.85, 0, t, 0);
    spawnParticles(bx - GS.cameraX, by, 7, {color:GLITTER[randInt(0,GLITTER.length-1)],speedMin:20,speedMax:90,lifeMin:0.1,lifeMax:0.28,sizeMin:1,sizeMax:3,upBias:0});
  } else if (t === 'scatter') {
    for (let a = -2; a <= 2; a++) {
      const ang = a * 0.18;
      spawnBullet(bx, by, dir * BULLET_SPEED * Math.cos(ang), BULLET_SPEED * Math.sin(ang) - 40, t, 3);
    }
  } else if (t === 'railgun') {
    // Instant piercing beam — hit all enemies in horizontal band
    const hitBand = { y: p.y - 10, h: p.h + 20 };
    for (const e of GS.enemies) {
      const ex = e.x - GS.cameraX;
      if (dir > 0 ? e.x > p.x : e.x < p.x + p.w) {
        if (e.y + e.h > hitBand.y && e.y < hitBand.y + hitBand.h) {
          e.hp = 0; e.alive = false;
          GS.score += 200;
          if (Math.random() < 0.25) GS.gems += randInt(1, 3);
          spawnParticles(ex+e.w/2, e.y+e.h/2, 20, {color:'#ffff44',speedMin:80,speedMax:350,lifeMin:0.2,lifeMax:0.6,sizeMin:2,sizeMax:7,upBias:60});
        }
      }
    }
    GS.enemies = GS.enemies.filter(e => e.alive);
    GS.railBeam = { dir, y: by, timer: 0.12, screenX: bx - GS.cameraX };
    updateHUD();
  } else if (t === 'homing_spread') {
    for (let a = -1; a <= 1; a++) {
      const ang = a * 0.28;
      spawnBullet(bx, by, dir * BULLET_SPEED * Math.cos(ang), BULLET_SPEED * Math.sin(ang) * 0.5, t, 0);
    }
  }
  sfxShoot(t);
}

function updateBullets(dt) {
  const fw = FLOOR_Y();
  const W = canvas.width;
  for (const b of GS.bullets) {
    if (!b.alive) continue;
    b.age += dt;
    if (b.age > 4) { b.alive = false; continue; }

    // Particle blaster range cap: 30% of screen width (not in dim room — bounded arena)
    if (b.gunType === 'particle_blaster' && GS.state !== 'dimensional' && Math.abs(b.wx - b.startWx) > W * 0.3) {
      const sx = b.wx - GS.cameraX;
      spawnParticles(sx, b.y, 10, {color:GLITTER[randInt(0,GLITTER.length-1)],speedMin:25,speedMax:110,lifeMin:0.1,lifeMax:0.35,sizeMin:1,sizeMax:4,upBias:0});
      b.alive = false; continue;
    }

    // Homing: steer toward nearest enemy
    if (b.gunType === 'homing_spread' && GS.enemies.length > 0) {
      let nearest = null, nd = Infinity;
      for (const e of GS.enemies) {
        const d = Math.hypot(e.x - b.wx, e.y - b.y);
        if (d < nd) { nd = d; nearest = e; }
      }
      if (nearest) {
        const tx = nearest.x - b.wx, ty = nearest.y - b.y;
        const len = Math.hypot(tx, ty) || 1;
        b.vx = lerp(b.vx, (tx/len) * BULLET_SPEED, 0.06);
        b.vy = lerp(b.vy, (ty/len) * BULLET_SPEED, 0.06);
      }
    }

    b.wx += b.vx * dt;
    b.y  += b.vy * dt;

    if (b.y >= fw) {
      if (b.bounces > 0) { b.y = fw - 1; b.vy = -Math.abs(b.vy) * 0.82; b.bounces--; }
      else { b.alive = false; continue; }
    }
    if (b.y < 0) {
      if (b.bounces > 0) { b.y = 1; b.vy = Math.abs(b.vy); b.bounces--; }
      else { b.alive = false; continue; }
    }

    // Far off-screen
    const sx = b.wx - GS.cameraX;
    if (sx < -200 || sx > W + 200) { b.alive = false; continue; }

    // Enemy hit
    for (const e of GS.enemies) {
      if (!e.alive) continue;
      const ex = e.x - GS.cameraX;
      if (rectsOverlap({x:sx-3,y:b.y-3,w:6,h:6},{x:ex,y:e.y,w:e.w,h:e.h})) {
        e.hp -= b.dmg;
        e.hitFlash = 0.15;
        const hitCol = b.gunType === 'particle_blaster' ? GLITTER[randInt(0,GLITTER.length-1)] : GUN_DEFS[b.gunType].color;
        spawnParticles(sx, b.y, b.gunType === 'particle_blaster' ? 10 : 5, {color:hitCol,speedMin:40,speedMax:160,lifeMin:0.1,lifeMax:0.3,sizeMin:1,sizeMax:3,upBias:20});
        if (e.hp <= 0) {
          e.alive = false;
          GS.score += 200;
          if (Math.random() < 0.25) GS.gems += randInt(1, 3);
          spawnParticles(ex+e.w/2, e.y+e.h/2, 14, {color:'#ffffff',speedMin:80,speedMax:300,lifeMin:0.3,lifeMax:0.7,sizeMin:2,sizeMax:6,upBias:80});
          updateHUD();
        }
        // Railgun pierces; others die on hit
        if (b.gunType !== 'railgun') { b.alive = false; }
        break;
      }
    }

    // Dimensional room enemy hit (screen-space coords, separate array)
    if (b.alive && GS.state === 'dimensional' && GS.dimRoom.active) {
      for (const e of GS.dimRoom.enemies) {
        if (!e.alive) continue;
        if (rectsOverlap({x:sx-3,y:b.y-3,w:6,h:6},{x:e.x,y:e.y,w:e.w,h:e.h})) {
          e.hp -= b.dmg;
          e.hitFlash = 0.15;
          const hitCol = b.gunType === 'particle_blaster' ? GLITTER[randInt(0,GLITTER.length-1)] : GUN_DEFS[b.gunType].color;
          spawnParticles(sx, b.y, b.gunType === 'particle_blaster' ? 10 : 5, {color:hitCol,speedMin:40,speedMax:160,lifeMin:0.1,lifeMax:0.3,sizeMin:1,sizeMax:3,upBias:20});
          if (e.hp <= 0) {
            e.alive = false;
            GS.score += 200;
            if (Math.random() < 0.25) GS.gems += randInt(1, 3);
            spawnParticles(e.x+e.w/2, e.y+e.h/2, 14, {color:'#ffffff',speedMin:80,speedMax:300,lifeMin:0.3,lifeMax:0.7,sizeMin:2,sizeMax:6,upBias:80});
            updateHUD();
          }
          if (b.gunType !== 'railgun') { b.alive = false; }
          break;
        }
      }
    }

    // Boss hit
    if (b.alive && GS.boss && GS.boss.alive && !GS.boss.dying) {
      const boss = GS.boss;
      const bsx = boss.x - GS.cameraX;
      if (rectsOverlap({x:sx-3,y:b.y-3,w:6,h:6},{x:bsx,y:boss.y,w:boss.w,h:boss.h})) {
        spawnParticles(sx, b.y, 6, {color:GUN_DEFS[b.gunType].color,speedMin:60,speedMax:200,lifeMin:0.1,lifeMax:0.3,sizeMin:2,sizeMax:4,upBias:30});
        const zone = b.y < boss.y + boss.h*0.35 ? 'head'
                   : b.y < boss.y + boss.h*0.68 ? 'body' : 'legs';
        boss.hitFlash = 0.18; boss.hitFlashZone = zone;
        if (zone === 'head') {
          boss.headHits++;
          if (boss.headHits >= boss.headHP) { boss.alive = false; boss.dying = true; sfxBossDeath(); }
        } else if (zone === 'body') {
          boss.bodyHits++;
          if (boss.bodyHits >= boss.bodyHP) { boss.alive = false; boss.dying = true; sfxBossDeath(); }
        } else {
          boss.legHits++;
          if (boss.legHits >= boss.legHP && !boss.legless) {
            boss.legless = true; boss.vx = 0; sfxBoss();
            spawnParticles(bsx+boss.w/2, boss.y+boss.h, 20, {color:'#ffffff',speedMin:100,speedMax:400,lifeMin:0.4,lifeMax:0.9,sizeMin:2,sizeMax:6});
          }
        }
        GS.score += 100;
        boss.headHits + boss.bodyHits + boss.legHits > 0 && updateHUD();
        if (b.gunType !== 'railgun') b.alive = false;
      }
    }
  }
  GS.bullets = GS.bullets.filter(b => b.alive);
  GS.enemies = GS.enemies.filter(e => e.alive);
  if (GS.railBeam) { GS.railBeam.timer -= dt; if (GS.railBeam.timer <= 0) GS.railBeam = null; }
}

function updateWeaponPickups(dt) {
  if (GS.worldReveal >= 0 && GS.worldReveal < 0.8) return;
  const p = GS.player;
  for (const pu of GS.weaponPickups) {
    if (pu.taken) continue;
    if (rectsOverlap({x:p.x,y:p.y,w:p.w,h:p.h},{x:pu.wx,y:pu.y,w:pu.w,h:pu.h})) {
      pu.taken = true;
      p.gun = { type: pu.type, ammo: Infinity };
      p.gunCooldown = 0;
      GS.announceText = GUN_DEFS[pu.type].label;
      GS.announceAlpha = 1.5;
    }
  }
}

function renderBullets() {
  for (const b of GS.bullets) {
    const sx = b.wx - GS.cameraX;
    const col = GUN_DEFS[b.gunType].color;
    ctx.save();
    if (b.gunType === 'particle_blaster') {
      const gc = GLITTER[Math.floor(b.age * 28) % GLITTER.length];
      ctx.shadowColor = gc;
      ctx.shadowBlur = 14;
      ctx.fillStyle = gc;
      ctx.beginPath();
      ctx.arc(sx, b.y, 3, 0, Math.PI*2);
      ctx.fill();
      // sparkle cross
      ctx.strokeStyle = gc;
      ctx.lineWidth = 1;
      const r = 5 + Math.sin(b.age * 40) * 2;
      ctx.beginPath(); ctx.moveTo(sx-r, b.y); ctx.lineTo(sx+r, b.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx, b.y-r); ctx.lineTo(sx, b.y+r); ctx.stroke();
    } else {
      ctx.shadowColor = col;
      ctx.shadowBlur = 8;
      ctx.fillStyle = col;
      if (b.gunType === 'railgun') {
        ctx.fillRect(sx - 6, b.y - 3, 12, 6);
      } else {
        ctx.beginPath();
        ctx.arc(sx, b.y, 4, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.restore();
  }
  // Railgun beam flash
  if (GS.railBeam) {
    const rb = GS.railBeam;
    const alpha = rb.timer / 0.12;
    ctx.save();
    ctx.globalAlpha = alpha * 0.85;
    ctx.strokeStyle = '#ffff44';
    ctx.lineWidth = 6;
    ctx.shadowColor = '#ffff44';
    ctx.shadowBlur = 30;
    ctx.beginPath();
    ctx.moveTo(rb.screenX, rb.y);
    ctx.lineTo(rb.dir > 0 ? canvas.width + 20 : -20, rb.y);
    ctx.stroke();
    ctx.restore();
  }
}

function renderWeaponPickups() {
  for (const pu of GS.weaponPickups) {
    if (pu.taken) continue;
    const sx = pu.wx - GS.cameraX;
    if (sx < -60 || sx > canvas.width + 60) continue;
    const col = GUN_DEFS[pu.type].color;
    const pulse = 0.7 + 0.3 * Math.sin(GS.levelTimer * 3.5);
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.fillStyle = col;
    ctx.shadowColor = col;
    ctx.shadowBlur = 12;
    // Gun icon: simple rect body + barrel
    ctx.fillRect(sx, pu.y + 6, 18, 8);
    ctx.fillRect(sx + 14, pu.y + 4, 10, 4);
    ctx.fillRect(sx + 4, pu.y + 14, 6, 5);
    ctx.globalAlpha = pulse * 0.9;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(GUN_DEFS[pu.type].label, sx + 12, pu.y - 4);
    ctx.restore();
  }
}

function renderPickupPrompt() {
  const pu = GS.pickupPrompt;
  if (!pu) return;
  const def = GUN_DEFS[pu.type];
  const sx = pu.wx - GS.cameraX;

  ctx.restore();
}

function renderGunHUD() {

  if (!p.gun) return;
