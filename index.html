// ── Enemy Spawning ─────────────────────────────
function spawnEnemy(worldX) {
  const pal = GS.world.palette;
  const isBossLevel = GS.level % 3 === 0;
  let type;
  if (isBossLevel) {
    // Pre-boss levels get all three types
    type = ['head','legs','torso'][randInt(0,2)];
  } else if (GS.level === 1) {
    type = Math.random() < 0.5 ? 'head' : 'legs';
  } else {
    type = ['head','legs','torso'][randInt(0,2)];
  }

  const fw = FLOOR_Y();
  const flying = type === 'head';
  const seed = randInt(1, 99999);

  const enemy = {
    type,
    x: worldX,
    y: flying ? rand(fw*0.2, fw*0.55) : fw - 30,
    w: type==='torso' ? 52 : 28,
    h: type==='torso' ? 40 : (flying ? 22 : 28),
    vx: type==='torso' ? rand(-60,-30) : (flying ? rand(-100,-60) : rand(-80,-40)),
    vy: flying ? Math.sin(Date.now()*0.002)*20 : 0,
    hp: type==='torso' ? 4 : 2,
    hitFlash: 0,
    alive: true,
    sprite: genSprite(seed, type==='torso'?52:28, type==='torso'?40:(flying?22:28), pal),
    seed,
  };
  GS.enemies.push(enemy);
}

function updateEnemies(dt) {
  GS.enemySpawnTimer -= dt;
  if (GS.enemySpawnTimer <= 0 && GS.distanceTraveled < GS.distanceGoal - canvas.width*0.3) {
    GS.enemySpawnTimer = rand(1.5, 3.5);
    const wx = GS.cameraX + canvas.width * 1.1;
    spawnEnemy(wx);
    if (Math.random() < 0.4) spawnEnemy(wx + rand(100,300));
  }

  const fw = FLOOR_Y();
  const p = GS.player;

  for (const e of GS.enemies) {
    if (!e.alive) continue;
    if (e.hitFlash > 0) e.hitFlash -= dt;

    const screenX = e.x - GS.cameraX;
    // Off-screen left: remove
    if (screenX < -200) { e.alive = false; continue; }

    // Move toward player
    const dx = (p.x) - e.x;
    const dir = dx < 0 ? -1 : 1;
    if (e.type === 'head') {
      e.x += e.vx * dt;
      e.vy = Math.sin(GS.levelTimer * 2 + e.seed) * 80;
      e.y += e.vy * dt;
      e.y = clamp(e.y, fw*0.15, fw*0.6);
      if (e.x - GS.cameraX < -50) e.vx = Math.abs(e.vx);
      if (e.x - GS.cameraX > canvas.width*0.9) e.vx = -Math.abs(e.vx);
    } else if (e.type === 'legs') {
      e.vx = -Math.abs(e.vx) * dir;
      e.x += dir * 70 * dt;
    } else {
      // Torso: slow charge
      if (Math.random() < 0.002) e.vx = dir * 160; // shoulder charge
      e.x += e.vx * dt;
      e.vx = lerp(e.vx, dir * 40, 0.03);
      e.y = fw - e.h;
    }

    // Player contact damage
    const ex = e.x - GS.cameraX;
    if (rectsOverlap({x:ex, y:e.y, w:e.w, h:e.h}, {x:p.x - GS.cameraX + 2, y:p.y, w:p.w-4, h:p.h}) && !p.isEvading) {
      takeDamage(ENEMY_CONTACT_DMG);
    }

    // Check player attack
    if (p.attackHitbox) {
      const ah = {
        x: p.attackHitbox.x - GS.cameraX + GS.cameraX,
        y: p.attackHitbox.y,
        w: p.attackHitbox.w, h: p.attackHitbox.h
      };
      const ahScreen = { x: p.attackHitbox.x, y: p.attackHitbox.y, w: p.attackHitbox.w, h: p.attackHitbox.h };
      if (rectsOverlap({x:ex, y:e.y, w:e.w, h:e.h}, {x: p.attackHitbox.x - GS.cameraX, y:p.attackHitbox.y, w:p.attackHitbox.w, h:p.attackHitbox.h})) {
        e.hp--;
        e.hitFlash = 0.15;
        p.attackHitbox = null;
        p.attackTimer = 0;
        GS.score += 50;
        spawnParticles(ex+e.w/2, e.y+e.h/2, 8, {color:GS.world.palette.accent,speedMin:60,speedMax:200,lifeMin:0.2,lifeMax:0.5,sizeMin:2,sizeMax:5,upBias:50});
        if (e.hp <= 0) {
          e.alive = false;
          GS.score += 150;
          if (Math.random() < 0.25) GS.gems += randInt(1, 3);
          spawnParticles(ex+e.w/2, e.y+e.h/2, 16, {color:'#ffffff',speedMin:80,speedMax:300,lifeMin:0.3,lifeMax:0.7,sizeMin:2,sizeMax:6,upBias:80});
          updateHUD();
        }
      }
    }
  }
  // Clean up dead enemies
  GS.enemies = GS.enemies.filter(e => e.alive);
}

function rectsOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

// ── Boss Update ───────────────────────────────
function updateBoss(dt) {
  if (!GS.boss || GS.boss.dead) return;
  const boss = GS.boss;
  const p = GS.player;
  const fw = FLOOR_Y();
  const W = canvas.width;

  if (boss.dying) {
    boss.dyingTimer += dt;
    GS.screenDistortion = Math.min(1, boss.dyingTimer / 3);
    if (boss.dyingTimer > 3.5) {
      boss.dead = true;
      triggerBossDeath();
    }
    return;
  }

  if (!boss.alive) return;

  boss.phaseTimer += dt;
  boss.attackTimer -= dt;
  if (boss.hitFlash > 0) boss.hitFlash -= dt;

  // Phase switching (damage-triggered)
  const totalHits = boss.headHits + boss.bodyHits + boss.legHits;
  const hpPct = 1 - totalHits / (boss.headHP + boss.bodyHP + boss.legHP);
  boss.hp = hpPct * 100;
  boss.redTint = clamp(1 - hpPct, 0, 1);
  GS.screenDistortion = boss.redTint * 0.6;

  // Phase cycling
  if (boss.phaseTimer > 5) {
    boss.phaseTimer = 0;
    if (boss.phase === 'flight') boss.phase = 'tank';
    else if (boss.phase === 'tank') boss.phase = 'ground';
    else boss.phase = 'flight';
  }

  // Movement based on phase
  const dx = p.x - boss.x;
  const dir = dx < 0 ? -1 : 1;
  if (boss.phase === 'flight') {
    boss.y = lerp(boss.y, fw*0.25, 0.02);
    boss.x += dir * 120 * dt;
  } else if (boss.phase === 'tank') {
    boss.y = lerp(boss.y, fw - boss.h, 0.05);
    boss.x += dir * 60 * dt;
  } else {
    boss.y = lerp(boss.y, fw - boss.h * 0.7, 0.04);
    boss.x += dir * 90 * dt;
  }

  boss.x = clamp(boss.x, W * 0.3, W * 0.85);

  // Attack: boss deals damage on contact
  const bx = boss.x - GS.cameraX;
  if (rectsOverlap({x:bx, y:boss.y, w:boss.w, h:boss.h}, {x:p.x - GS.cameraX + 2, y:p.y, w:p.w-4, h:p.h}) && !p.isEvading) {
    const dmg = boss.phase === 'tank' ? 12 : (boss.phase === 'flight' ? 8 : 10);
    takeDamage(dmg * dt);
  }

  // Player attack vs boss parts
  if (p.attackHitbox) {
    let hitPart = null;
    const ah = p.attackHitbox;
    // Head zone: top third
    const headZone = { x:boss.x-GS.cameraX+10, y:boss.y, w:boss.w-20, h:boss.h*0.35 };
    // Body zone: middle
    const bodyZone = { x:boss.x-GS.cameraX+5, y:boss.y+boss.h*0.33, w:boss.w-10, h:boss.h*0.35 };
    // Leg zone: bottom
    const legZone  = { x:boss.x-GS.cameraX+10, y:boss.y+boss.h*0.65, w:boss.w-20, h:boss.h*0.35 };

    if (boss.phase === 'flight' && rectsOverlap(ah, headZone)) {
      hitPart = 'head';
    } else if (boss.phase === 'tank' && rectsOverlap(ah, bodyZone)) {
      hitPart = 'body';
    } else if (boss.phase === 'ground' && !boss.legless && rectsOverlap(ah, legZone)) {
      hitPart = 'legs';
    } else if (boss.legless && rectsOverlap(ah, {x:boss.x-GS.cameraX, y:boss.y, w:boss.w, h:boss.h})) {
      hitPart = 'legless_kill';
    }

    if (hitPart) {
      p.attackHitbox = null;
      p.attackTimer = 0;
      GS.score += 500;
      sfxHit();
      // Screen crack effect
      GS.screenCracks.push({
        x: rand(0.1,0.9), y: rand(0.1,0.9),
        life: 8, maxLife: 8,
        angle: rand(0, Math.PI),
        len: rand(50, 200),
      });

      boss.hitFlash = 0.18; boss.hitFlashZone = hitPart;
      if (hitPart === 'head') {
        boss.headHits++;
        spawnParticles(bx+boss.w/2, boss.y+10, 12, {color:'#ff4466',speedMin:100,speedMax:350,lifeMin:0.3,lifeMax:0.7,sizeMin:3,sizeMax:7,upBias:100});
        if (boss.headHits >= boss.headHP) {
          boss.alive = false;
          boss.dying = true;
          sfxBossDeath();
        }
      } else if (hitPart === 'body') {
        boss.bodyHits++;
        spawnParticles(bx+boss.w/2, boss.y+boss.h/2, 12, {color:'#ff8800',speedMin:80,speedMax:280,lifeMin:0.3,lifeMax:0.7,sizeMin:3,sizeMax:7});
        if (boss.bodyHits >= boss.bodyHP) {
          boss.alive = false;
          boss.dying = true;
          sfxBossDeath();
        }
      } else if (hitPart === 'legs') {
        boss.legHits++;
        spawnParticles(bx+boss.w/2, boss.y+boss.h-10, 10, {color:'#ffaa00',speedMin:60,speedMax:200,lifeMin:0.2,lifeMax:0.5,sizeMin:2,sizeMax:5});
        if (boss.legHits >= boss.legHP) {
          boss.legless = true;
          boss.vx = 0;
          // Legless: faster, more erratic
          spawnParticles(bx+boss.w/2, boss.y+boss.h, 20, {color:'#ffffff',speedMin:100,speedMax:400,lifeMin:0.4,lifeMax:0.9,sizeMin:2,sizeMax:6});
          sfxBoss();
        }
      } else if (hitPart === 'legless_kill') {
        boss.alive = false;
        boss.dying = true;
        sfxBossDeath();
      }
      updateHUD();
    }
  }
}

function triggerBossDeath() {
  GS.score += 2000;
  sfxBossDeath();
  GS.state = 'boss_cinematic';
  const boss = GS.boss;
  GS.cinematic = {
    phase: 'head_fall',
    timer: 0,
    headX: boss ? (boss.x - GS.cameraX + boss.w/2 - 20) : canvas.width/2 - 20,
    headY: boss ? boss.y : FLOOR_Y() - 80,
    headVy: -180,
    blackAlpha: 0,
    beamAlpha: 0,
    beamH: 0,
    shipVisible: Math.random() < 0.003,
    settled: false,
  };
}

function updateCinematic(dt) {
  const c = GS.cinematic;
  if (!c) return;
  c.timer += dt;
  const fw = FLOOR_Y();

  if (c.phase === 'head_fall') {
    c.headVy += 700 * dt;
    c.headY += c.headVy * dt;
    if (c.headY + 36 >= fw) {
      c.headY = fw - 36;
      c.headVy = 0;
      c.settled = true;
    }
    if (c.settled && c.timer > 1.6) {
      c.phase = 'blackout';
      c.timer = 0;
    }
  } else if (c.phase === 'blackout') {
    c.blackAlpha = Math.min(1, c.timer / 0.9);
    if (c.timer > 1.1) {
      c.phase = 'beam_down';
      c.timer = 0;
      sfxBeam();
    }
  } else if (c.phase === 'beam_down') {
    c.beamH = Math.min(fw, (c.timer / 1.1) * fw);
    c.beamAlpha = Math.min(1, c.timer * 1.8);
    if (c.timer > 1.3) {
      c.phase = 'head_ascend';
      c.timer = 0;
      c.headVy = -120;
    }
  } else if (c.phase === 'head_ascend') {
    c.headVy -= 280 * dt;
    c.headY += c.headVy * dt;
    c.beamAlpha = Math.max(0, 1 - c.timer * 0.6);
    if (c.headY < -60) {
      c.phase = 'hold';
      c.timer = 0;
      c.beamAlpha = 0;
    }
  } else if (c.phase === 'hold') {
    if (c.timer > 1.4) {
      GS.level++;
      generateLevel();
      GS.state = 'playing';
      GS.worldReveal = 0;
      GS.worldNameFadeT = 0;
      GS.player.x = 120;
      GS.player.y = FLOOR_Y() - GS.player.h;
      GS.player.vx = 0;
      GS.player.vy = 0;
      GS.cameraX = 0;
      updateHUD();
    }
  }
}

function renderCinematic() {
  const W = canvas.width, H = canvas.height;
  const fw = FLOOR_Y();
  const c = GS.cinematic;
  if (!c) return;
  const pal = GS.world.palette;

  // World still visible until blackout
  if (c.blackAlpha < 1) {
    renderBackground(pal);
    renderFloor();
    renderPlatforms();
    renderParticles();
  }

  // Head resting / falling (visible until ascent phase)
  if (c.phase !== 'hold' && GS.boss && GS.boss.headSprite) {
    if (c.phase !== 'head_ascend' || c.headY < fw) {
      ctx.save();
      const hAlpha = c.phase === 'head_ascend' ? Math.max(0, 1 + c.headY / 60) : 1;
      ctx.globalAlpha = hAlpha;
      ctx.drawImage(GS.boss.headSprite, c.headX, c.headY, 40, 36);
      ctx.restore();
    }
  }

  // Black overlay
  if (c.blackAlpha > 0) {
    ctx.fillStyle = `rgba(0,0,0,${c.blackAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Beam of light
  if (c.beamAlpha > 0 && c.beamH > 0) {
    ctx.save();
    ctx.globalAlpha = c.beamAlpha * 0.55;
    const bx = c.headX + 20;
    const beamGrad = ctx.createLinearGradient(bx, 0, bx, c.beamH);
    beamGrad.addColorStop(0, 'rgba(255,255,220,0)');
    beamGrad.addColorStop(0.4, 'rgba(255,255,210,0.9)');
    beamGrad.addColorStop(1, 'rgba(255,240,180,0.3)');
    ctx.fillStyle = beamGrad;
    ctx.fillRect(bx - 12, 0, 24, c.beamH);
    // Wider soft glow
    ctx.globalAlpha = c.beamAlpha * 0.12;
    ctx.fillStyle = 'rgba(255,255,200,1)';
    ctx.fillRect(bx - 50, 0, 100, c.beamH);
    ctx.restore();
  }

  // Ascending head (over beam)
  if (c.phase === 'head_ascend' && GS.boss && GS.boss.headSprite) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 + c.headY / 60);
    ctx.drawImage(GS.boss.headSprite, c.headX, c.headY, 40, 36);
    ctx.restore();
  }

  // The Ship — appears briefly during hold at extremely low probability
  if (c.phase === 'hold' && c.shipVisible && c.timer > 0.2 && c.timer < 0.65) {
    const shipAlpha = Math.sin((c.timer - 0.2) / 0.45 * Math.PI) * 0.18;
    ctx.save();
    ctx.globalAlpha = shipAlpha;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    const sx = W * 0.6, sy = H * 0.22;
    ctx.beginPath();
    ctx.moveTo(sx, sy + 10);
    ctx.lineTo(sx + 40, sy + 10);
    ctx.lineTo(sx + 50, sy);
    ctx.lineTo(sx + 60, sy + 10);
    ctx.lineTo(sx + 80, sy + 10);
    ctx.lineTo(sx + 70, sy + 22);
    ctx.lineTo(sx + 10, sy + 22);
    ctx.closePath();
    ctx.stroke();
    ctx.moveTo(sx + 30, sy + 10);
    ctx.lineTo(sx + 35, sy - 8);
    ctx.lineTo(sx + 50, sy + 10);
    ctx.stroke();
    ctx.restore();
  }
}

// ── Dimensional Room ───────────────────────────
function enterDimensionalRoom() {
  sfxDimEnter();
  GS.state = 'dimensional';
  const dr = GS.dimRoom;
  dr.active = true;
  dr.wave = 0;
  dr.totalWaves = 3;
  dr.enemies = [];
  dr.phase = 'wave';
  dr.previewTimer = 0;
  dr.flashTimer = 0;
  dr.flashCount = 0;
  dr.assemble = null;
  const invSide = Math.random() < 0.5 ? 0 : 1;
  const dimFloorY = canvas.height - 80 - 80; // doors sit at the bottom boundary
  dr.exitDoors = [
    { x: canvas.width*0.15, y: dimFloorY, w:50, h:80, type: invSide===0 ? 'A' : 'B', chosen: false },
    { x: canvas.width*0.8,  y: dimFloorY, w:50, h:80, type: invSide===1 ? 'A' : 'B', chosen: false },
  ];
  spawnDimWave();
}

function spawnDimWave() {
  const dr = GS.dimRoom;
  dr.enemies = [];
  const pal = GS.world.palette;
  const cx = canvas.width/2, cy = canvas.height/2;

  // wave 0=heads, 1=torsos, 2=legs
  const waveTypes = [
    ['head','head','head'],
    ['torso','torso','torso'],
    ['legs','legs','legs'],
  ];
  const types = waveTypes[Math.min(dr.wave, 2)];

  for (let i=0; i<types.length; i++) {
    const type = types[i];
    const angle = (i/types.length) * Math.PI*2;
    dr.enemies.push({
      type,
      x: cx + Math.cos(angle)*rand(150,260),
      y: cy + Math.sin(angle)*rand(150,260),
      vx: 0, vy: 0,
      w: type==='torso'?52:28,
      h: type==='torso'?40:28,
      hp: type==='torso'?4:2,
      hitFlash: 0,
      alive: true,
      orbit: null,
      sprite: genSprite(randInt(1,99999), type==='torso'?52:28, 28, pal),
    });
  }
}

function updateDimensionalRoom(dt) {
  const dr = GS.dimRoom;
  const p = GS.player;

  if (dr.phase === 'exit') {
    // Check door interaction
    for (const door of dr.exitDoors) {
      if (rectsOverlap({x:p.x,y:p.y,w:p.w,h:p.h},{x:door.x,y:door.y,w:door.w,h:door.h})) {
        if (Keys.just['ArrowUp'] || Keys.just['KeyW']) {
          exitDimensionalRoom(door.type);
        }
      }
    }
    return;
  }

  if (dr.phase === 'assemble') { updateDimAssemble(dt); return; }

  // Wave combat
  for (const e of dr.enemies) {
    if (!e.alive) continue;
    if (e.hitFlash > 0) e.hitFlash -= dt;

    // Chase player
    {
      const dx = p.x - e.x, dy = p.y - e.y;
      const dist = Math.sqrt(dx*dx+dy*dy) || 1;
      const speed = e.type==='torso' ? 60 : (e.type==='head'?110:90);
      e.vx = (dx/dist)*speed;
      e.vy = (dy/dist)*speed;
      e.x += e.vx * dt;
      e.y += e.vy * dt;
    }

    // Boundary
    e.x = clamp(e.x, 40, canvas.width-40-e.w);
    e.y = clamp(e.y, 60, canvas.height-80-e.h);

    // Contact damage
    if (rectsOverlap({x:e.x,y:e.y,w:e.w,h:e.h},{x:p.x+2,y:p.y,w:p.w-4,h:p.h}) && !p.isEvading) {
      takeDamage(ENEMY_CONTACT_DMG);
    }

    // Bullet hit handled in updateBullets
  }
  dr.enemies = dr.enemies.filter(e => e.alive);

  if (dr.enemies.length === 0) {
    dr.wave++;
    if (dr.wave >= dr.totalWaves) {
      // All 3 waves cleared — boss assembles
      dr.phase = 'assemble';
      const W = canvas.width, H = canvas.height;
      const cx = W / 2, cy = H / 2;
      const sc = 1.5;
      const hw = Math.round(28*sc), hh = Math.round(28*sc);
      const tw = Math.round(52*sc), th = Math.round(40*sc);
      const pal = GS.world.palette;
      dr.assemble = {
        subPhase: 'gather',
        timer: 0,
        fleeDirX: Math.random() < 0.5 ? -1 : 1,
        parts: [
          { type:'head',  x: W*0.85, y: H*0.1,  tx: cx - hw/2,      ty: cy - th/2 - hh, w: hw, h: hh },
          { type:'torso', x: W*0.1,  y: H*0.65, tx: cx - tw/2,      ty: cy - th/2,      w: tw, h: th },
          { type:'legs',  x: W*0.1,  y: H*0.1,  tx: cx - hw/2,      ty: cy - th/2 + th, w: hw, h: hh },
        ],
      };
      GS.announceText = 'ASSEMBLING';
      GS.announceAlpha = 2.0;
    } else {
      const nextLabel = ['HEADS', 'TORSOS', 'LEGS'][dr.wave] || '';
      if (nextLabel) { GS.announceText = nextLabel; GS.announceAlpha = 1.5; }
      setTimeout(()=>spawnDimWave(), 900);
    }
  }
}

function updateDimAssemble(dt) {
  const dr = GS.dimRoom;
  const a = dr.assemble;
  a.timer += dt;

  if (a.subPhase === 'gather') {
    let allClose = true;
    for (const part of a.parts) {
      part.x = lerp(part.x, part.tx, 0.07);
      part.y = lerp(part.y, part.ty, 0.07);
      if (Math.abs(part.x - part.tx) > 3 || Math.abs(part.y - part.ty) > 3) allClose = false;
    }
    if (allClose || a.timer > 2.5) {
      for (const part of a.parts) { part.x = part.tx; part.y = part.ty; }
      a.subPhase = 'hold';
      a.timer = 0;
      GS.flashAlpha = 0.7;
      GS.announceText = 'IT FLEES';
      GS.announceAlpha = 2.5;
    }
  } else if (a.subPhase === 'hold') {
    if (a.timer > 1.4) {
      a.subPhase = 'flee';
      a.timer = 0;
    }
  } else if (a.subPhase === 'flee') {
    const spd = 750;
    for (const part of a.parts) {
      part.x += a.fleeDirX * spd * dt;
      part.y -= 80 * dt;
    }
    const W = canvas.width;
    const offScreen = a.parts.every(p => p.x > W + 80 || p.x + p.w < -80);
    if (offScreen || a.timer > 2.5) {
      dr.phase = 'exit';
    }
  }
}

function exitDimensionalRoom(doorType) {
  sfxDimEnter();
  GS.state = 'playing';
  GS.dimRoom.active = false;
  GS.dimDoorActive = false;
  const p = GS.player;
  p.hearts = Math.min(p.hearts + 1, p.maxHearts);
  sfxHeart();

  // Tier-scaled gem cache awarded on exit
  const tier = GS.level <= 3 ? 'low' : GS.level <= 6 ? 'mid' : 'high';
  const gemCache = tier === 'low' ? 5 : tier === 'mid' ? 12 : 20;
  GS.gems += gemCache;

  // Gem spend: upgrades door reward, then resets gems
  if (doorType === 'A') {
    p.isGold = true;
    p.invBudget = GS.gems >= 20 ? p.invMax * 2 : p.invMax;
    GS.announceText = GS.gems >= 20 ? 'DOUBLE INVINCIBLE' : 'INVINCIBLE';
    GS.announceAlpha = 2;
  } else {
    // Door B: gems >= 10 adds a partial inv budget
    if (GS.gems >= 10) {
      p.isGold = true;
      p.invBudget = p.invMax * 0.5;
      GS.announceText = 'HEART + SHIELD';
      GS.announceAlpha = 2;
    }
  }
  GS.gems = 0;
  updateHUD();
}

// ── Level Progression ─────────────────────────
function checkLevelComplete() {
  if (GS.distanceTraveled >= GS.distanceGoal && !GS.bossActive) {
    if (GS.level % 3 !== 0) {
      // Normal level complete
      GS.state = 'transition';
      GS.score += 500;
      setTimeout(()=>{
        GS.level++;
        generateLevel();
        GS.state = 'playing';
        GS.flashAlpha = 0.6;
        GS.player.x = 120;
        GS.player.y = FLOOR_Y() - GS.player.h;
        GS.player.vx = 0; GS.player.vy = 0;
        GS.cameraX = 0;
        updateHUD();
      }, 1200);
    }
  }
}

// ── Game Over ─────────────────────────────────
function triggerGameOver() {
  GS.state = 'gameover';
  document.getElementById('touch-controls').classList.remove('tc-active');
  document.getElementById('final-score').textContent = GS.score.toLocaleString();
  document.getElementById('gameover-screen').classList.remove('hidden');
}

// ── Particles Update ──────────────────────────
function updateParticles(dt) {
  for (const p of GS.particles) {
    if (!p.active) continue;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 300 * dt;
    p.life -= dt;
    if (p.life <= 0) p.active = false;
  }
  if (GS.particles.length > 600) GS.particles = GS.particles.filter(p=>p.active).slice(-400);
}

// ── Dim Door Check ─────────────────────────────
function checkDimDoor(dt) {
  if (!GS.dimDoorActive || !GS.dimDoor) return;
  const p = GS.player;
  const door = GS.dimDoor;
  const pBox = {x:p.x-2, y:p.y, w:p.w+4, h:p.h};
  const dBox = {x:door.x-20, y:door.y-30, w:door.w+40, h:door.h+60};
  const overlap = rectsOverlap(pBox, dBox);

  const holdingUp   = Keys.held['ArrowUp']   || Keys.held['KeyW'];
  const movingSide  = Keys.held['ArrowLeft']  || Keys.held['KeyA'] || Keys.held['ArrowRight'] || Keys.held['KeyD'];

  if (overlap && holdingUp && !movingSide) {
    enterDimensionalRoom();
  }
}

// ── Dimensional Room Player Physics ───────────
function updatePlayerDim(dt) {
  const p = GS.player;
  const W = canvas.width, H = canvas.height;

  if (p.attackTimer > 0) p.attackTimer -= dt;
  if (p.flashTimer > 0) p.flashTimer -= dt;
  if (p.attackTimer <= 0) p.attackHitbox = null;

  const left  = Keys.held['KeyA'] || Keys.held['ArrowLeft'];
  const right = Keys.held['KeyD'] || Keys.held['ArrowRight'];
  const up    = Keys.held['KeyW'] || Keys.held['ArrowUp'];
  const down  = Keys.held['KeyS'] || Keys.held['ArrowDown'];

  if (left)  { p.vx = lerp(p.vx, -PLAYER_SPEED, 0.35); p.facing = -1; }
  if (right) { p.vx = lerp(p.vx,  PLAYER_SPEED, 0.35); p.facing =  1; }
  if (!left && !right) p.vx = lerp(p.vx, 0, 0.3);
  if (up)    { p.vy = lerp(p.vy, -PLAYER_SPEED, 0.35); }
  if (down)  { p.vy = lerp(p.vy,  PLAYER_SPEED, 0.35); }
  if (!up && !down) p.vy = lerp(p.vy, 0, 0.3);

  if (p.gunCooldown > 0) p.gunCooldown -= dt;
  const pbChaseDim = p.gun?.type === 'particle_blaster' && (Keys.held['KeyJ'] || Keys.held['KeyZ']);
  if (Keys.just['KeyJ'] || Keys.just['KeyZ'] || attackBuffer || pbChaseDim) {
    attackBuffer = false;
    fireGun();
  }

  p.x += p.vx * dt;
  p.y += p.vy * dt;
  p.x = clamp(p.x, 30, W - 30 - p.w);
  p.y = clamp(p.y, 60, H - 80 - p.h);
}

// ── RENDERING ─────────────────────────────────

function renderBackground(pal) {
  const W = canvas.width, H = canvas.height;
  // Sky gradient
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, pal.sky);
  grad.addColorStop(0.7, pal.bg);
  grad.addColorStop(1, darken(pal.ground, 0.3));
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Parallax mid layer stars/elements
  const offsetMid = GS.cameraX * 0.15;
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = pal.accent;
  const rngB = mulberry32(Math.floor(GS.level*17 + 3));
  for (let i=0;i<40;i++) {
    const bx = ((rngB()*W*3 - offsetMid) % (W*1.5) + W*1.5) % (W*1.5) - W*0.25;
    const by = rngB()*H*0.7;
    const bs = rngB()*3+1;
    ctx.fillRect(bx, by, bs, bs);
  }
  ctx.globalAlpha = 1;
}

function renderPlatforms() {
  const pal = GS.world.palette;
  for (const pl of GS.platforms) {
    const sx = pl.x - GS.cameraX;
    if (sx > canvas.width + 20 || sx + pl.w < -20) continue;
    // Platform body
    ctx.fillStyle = pl.color;
    ctx.fillRect(sx, pl.y, pl.w, pl.h);
    // Top highlight
    ctx.fillStyle = lighten(pl.color, 0.3);
    ctx.fillRect(sx, pl.y, pl.w, 3);
    // Bottom shadow
    ctx.fillStyle = darken(pl.color, 0.4);
    ctx.fillRect(sx, pl.y+pl.h-3, pl.w, 3);
  }
}

function renderFloor() {
  const pal = GS.world.palette;
  const W = canvas.width, H = canvas.height;
  const fw = FLOOR_Y();

  // Floor
  const fGrad = ctx.createLinearGradient(0, fw, 0, H);
  fGrad.addColorStop(0, pal.ground);
  fGrad.addColorStop(0.15, darken(pal.ground, 0.3));
  fGrad.addColorStop(1, '#000');
  ctx.fillStyle = fGrad;
  ctx.fillRect(0, fw, W, H-fw);
  // Floor top line
  ctx.fillStyle = lighten(pal.ground, 0.2);
  ctx.fillRect(0, fw, W, 3);

  // Spikes
  for (const sp of GS.spikes) {
    const sx = sp.x - GS.cameraX;
    if (sx > W + 20 || sx + sp.w < -20) continue;
    ctx.fillStyle = '#c8c8c8';
    const count = 5;
    const sw = sp.w / count;
    for (let i=0;i<count;i++) {
      ctx.beginPath();
      ctx.moveTo(sx + i*sw, sp.y + sp.h);
      ctx.lineTo(sx + i*sw + sw/2, sp.y);
      ctx.lineTo(sx + i*sw + sw, sp.y + sp.h);
      ctx.closePath();
      ctx.fill();
    }
  }
}

function renderDimDoor() {
  if (!GS.dimDoorActive || !GS.dimDoor) return;
  const door = GS.dimDoor;
  const sx = door.x - GS.cameraX;
  if (sx < -60 || sx > canvas.width + 60) return;

  // Fade signal based on level (GDD: early=clear, late=shimmer)
  const alpha = Math.max(0.05, 1 - GS.level * 0.08) * (0.6 + 0.4*Math.sin(GS.levelTimer*3));

  ctx.save();
  ctx.globalAlpha = alpha;
  // Door frame
  ctx.strokeStyle = GS.world.palette.accent;
  ctx.lineWidth = 3;
  ctx.shadowColor = GS.world.palette.accent;
  ctx.shadowBlur = 20;
  ctx.strokeRect(sx, door.y, door.w, door.h);
  // Inner glow
  const grad = ctx.createLinearGradient(sx, door.y, sx, door.y+door.h);
  grad.addColorStop(0, GS.world.palette.accent+'40');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(sx+3, door.y+3, door.w-6, door.h-6);
  // UP arrow hint
  ctx.fillStyle = GS.world.palette.accent;
  ctx.font = 'bold 11px Chakra Petch, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('↑', sx + door.w/2, door.y - 8);
  ctx.restore();
}

function renderPlayer() {
  const p = GS.player;
  const px = (GS.state === 'dimensional') ? p.x : p.x;
  const camX = (GS.state === 'dimensional') ? 0 : GS.cameraX;
  const sx = px - camX;

  // Flash (i-frames)
  if (p.flashTimer > 0 && Math.floor(p.flashTimer*12)%2===1) return;

  ctx.save();

  // Gold tint if invincible
  if (p.isGold) {
    ctx.shadowColor = '#f5c842';
    ctx.shadowBlur = 12;
  }

  // Draw sprite or fallback rectangle
  if (p.sprite) {
    ctx.save();
    if (p.facing < 0) {
      ctx.translate(sx + p.w, p.y);
      ctx.scale(-1, 1);
      ctx.drawImage(p.sprite, 0, 0, p.w, p.h);
    } else {
      ctx.drawImage(p.sprite, sx, p.y, p.w, p.h);
    }
    ctx.restore();
  } else {
    ctx.fillStyle = '#e8e8ec';
    ctx.fillRect(sx, p.y, p.w, p.h);
  }

  // Attack flash
  if (p.attackTimer > 0) {
    const atype = p.attackHitbox?.type;
    ctx.strokeStyle = atype==='spin' ? GS.world.palette.accent : '#ffffff';
    ctx.lineWidth = 2;
    ctx.globalAlpha = p.attackTimer * 4;
    const aw = p.w * (atype==='spin' ? 1.6 : 1.2);
    const ax = p.facing > 0 ? sx + p.w : sx - aw;
    ctx.strokeRect(ax, p.y+4, aw, p.h-8);
    ctx.globalAlpha = 1;
  }

  // Dash trail
  if (p.isDashing) {
    for (let i=1;i<=3;i++) {
      ctx.globalAlpha = 0.15 * (4-i);
      ctx.fillStyle = '#aaaaff';
      ctx.fillRect(sx - p.vx*0.003*i, p.y, p.w, p.h);
    }
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawEnemyHead(ctx, x, y, w, h, pal, flash) {
  const cx = x + w/2, cy = y + h/2;
  const rx = w * 0.44, ry = h * 0.46;
  // Skull shape
  ctx.fillStyle = flash > 0 ? '#fff' : darken(pal.accent, 0.2);
  ctx.beginPath();
  ctx.ellipse(cx, cy - h*0.05, rx, ry, 0, 0, Math.PI*2);
  ctx.fill();
  // Jaw — flat bottom
  ctx.fillStyle = flash > 0 ? '#fff' : darken(pal.accent, 0.4);
  ctx.fillRect(cx - rx*0.55, cy + ry*0.35, rx*1.1, ry*0.45);
  // Eye sockets
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(cx - w*0.17, cy - h*0.08, w*0.11, h*0.13, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + w*0.17, cy - h*0.08, w*0.11, h*0.13, 0, 0, Math.PI*2);
  ctx.fill();
  // Glowing pupils
  ctx.fillStyle = flash > 0 ? '#fff' : pal.accent;
  ctx.shadowColor = pal.accent;
  ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.arc(cx - w*0.17, cy - h*0.08, w*0.055, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + w*0.17, cy - h*0.08, w*0.055, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // Teeth
  ctx.fillStyle = flash > 0 ? '#aaa' : 'rgba(255,255,255,0.7)';
  const tw = rx*0.18, th = ry*0.22, tx0 = cx - rx*0.4;
  for (let i=0; i<3; i++) {
    ctx.fillRect(tx0 + i*(tw+2), cy + ry*0.35, tw, th);
  }
}

function drawEnemyLegs(ctx, x, y, w, h, pal, flash) {
  const base = flash > 0 ? '#fff' : pal.accent;
  const dk = flash > 0 ? '#ccc' : darken(pal.accent, 0.35);
  const boot = flash > 0 ? '#888' : darken(pal.accent, 0.55);
  const lw = w * 0.34, gap = w * 0.08;
  const lx = x + w/2 - lw - gap/2;
  const rx2 = x + w/2 + gap/2;
  const thighH = h * 0.45, shinH = h * 0.38, bootH = h * 0.17;
  // Thighs
  ctx.fillStyle = base;
  ctx.fillRect(lx,  y, lw, thighH);
  ctx.fillRect(rx2, y, lw, thighH);
  // Knee band
  ctx.fillStyle = dk;
  ctx.fillRect(lx,  y + thighH - 3, lw, 5);
  ctx.fillRect(rx2, y + thighH - 3, lw, 5);
  // Shins
  ctx.fillStyle = dk;
  ctx.fillRect(lx  + 2, y + thighH, lw - 4, shinH);
  ctx.fillRect(rx2 + 2, y + thighH, lw - 4, shinH);
  // Boots
  ctx.fillStyle = boot;
  ctx.fillRect(lx  - 2, y + thighH + shinH, lw + 4, bootH);
  ctx.fillRect(rx2 - 2, y + thighH + shinH, lw + 4, bootH);
  // Highlight stripe on thigh
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(lx  + 2, y + 2, 3, thighH - 4);
  ctx.fillRect(rx2 + 2, y + 2, 3, thighH - 4);
}

function drawEnemyTorso(ctx, x, y, w, h, pal, flash) {
  const base  = flash > 0 ? '#fff' : pal.accent;
  const dk    = flash > 0 ? '#ccc' : darken(pal.accent, 0.35);
  const lt    = flash > 0 ? '#fff' : lighten(pal.accent, 0.25);
  const bw = w * 0.52, bx = x + (w - bw)/2;
  const aw = w * 0.18;
  // Body
  ctx.fillStyle = base;
  ctx.fillRect(bx, y + h*0.05, bw, h * 0.9);
  // Highlight
  ctx.fillStyle = lt;
  ctx.fillRect(bx + 3, y + h*0.05, 4, h * 0.9);
  // Shadow
  ctx.fillStyle = dk;
  ctx.fillRect(bx + bw - 4, y + h*0.05, 4, h * 0.9);
  // Spine detail
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(bx + bw/2 - 2, y + h*0.1, 4, h * 0.8);
  // Arms
  ctx.fillStyle = dk;
  ctx.fillRect(x, y + h*0.1, aw, h * 0.7);
  ctx.fillRect(x + w - aw, y + h*0.1, aw, h * 0.7);
  // Severed neck top — ragged
  ctx.fillStyle = '#7a0000';
  ctx.fillRect(bx + bw*0.2, y, bw*0.6, h*0.07);
  // Severed legs bottom — ragged
  ctx.fillRect(bx + bw*0.15, y + h*0.93, bw*0.7, h*0.07);
}

function renderEnemy(e) {
  const camX = (GS.state === 'dimensional') ? 0 : GS.cameraX;
  const sx = e.x - camX;
  if (sx < -e.w - 10 || sx > canvas.width + 10) return;

  ctx.save();
  if (e.hitFlash > 0) {
    ctx.globalAlpha = 0.5;
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 8;
  }
  const pal = GS.world.palette;
  if (e.type === 'head') {
    drawEnemyHead(ctx, sx, e.y, e.w, e.h, pal, e.hitFlash);
  } else if (e.type === 'legs') {
    drawEnemyLegs(ctx, sx, e.y, e.w, e.h, pal, e.hitFlash);
  } else {
    drawEnemyTorso(ctx, sx, e.y, e.w, e.h, pal, e.hitFlash);
  }
  ctx.restore();
}

function renderBoss() {
  if (!GS.boss || GS.boss.dead) return;
  const boss = GS.boss;
  const sx = boss.x - GS.cameraX;

  ctx.save();

  // Red tint as health drops
  if (boss.redTint > 0) {
    ctx.filter = `hue-rotate(${boss.redTint*30}deg) saturate(${1+boss.redTint*2})`;
  }

  // Draw base sprite
  if (boss.sprite) ctx.drawImage(boss.sprite, sx, boss.y, boss.w, boss.h);

  // Hit flash — red transparent glow over struck zone
  if (boss.hitFlash > 0) {
    const flashAlpha = (boss.hitFlash / 0.18) * 0.55;
    const zone = boss.hitFlashZone;
    let zy = boss.y, zh = boss.h;
    if (zone === 'head')  { zy = boss.y;                   zh = boss.h * 0.35; }
    if (zone === 'body')  { zy = boss.y + boss.h * 0.33;   zh = boss.h * 0.35; }
    if (zone === 'legs')  { zy = boss.y + boss.h * 0.65;   zh = boss.h * 0.35; }
    ctx.shadowColor = '#ff2200';
    ctx.shadowBlur = 18;
    ctx.fillStyle = `rgba(255,30,0,${flashAlpha})`;
    ctx.fillRect(sx, zy, boss.w, zh);
    ctx.shadowBlur = 0;
  }

  // HP pips (3 per zone, drawn outside boss body)
  const zones = [
    { hits: boss.headHits, hp: boss.headHP, y: boss.y + boss.h*0.18,  defeated: boss.headHits >= boss.headHP },
    { hits: boss.bodyHits, hp: boss.bodyHP, y: boss.y + boss.h*0.52,  defeated: boss.bodyHits >= boss.bodyHP },
    { hits: boss.legHits,  hp: boss.legHP,  y: boss.y + boss.h*0.82,  defeated: boss.legless },
  ];
  for (const z of zones) {
    for (let i = 0; i < z.hp; i++) {
      const px = sx + boss.w + 8 + i * 9;
      const hit = i < z.hits;
      ctx.beginPath();
      ctx.arc(px, z.y, 3, 0, Math.PI*2);
      ctx.fillStyle = z.defeated ? 'rgba(255,255,255,0.15)' : hit ? 'rgba(255,60,60,0.9)' : 'rgba(255,255,255,0.7)';
      ctx.fill();
    }
  }

  ctx.restore();
}

function renderParticles() {
  for (const p of GS.particles) {
    if (!p.active) continue;
    const alpha = clamp(p.life / p.maxLife, 0, 1);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    const sz = p.size * alpha;
    ctx.fillRect(p.x - sz/2, p.y - sz/2, sz, sz);
  }
  ctx.globalAlpha = 1;
}

function renderScreenDamage() {
  if (GS.screenCracks.length === 0 && GS.screenDistortion === 0) return;
  const W = canvas.width, H = canvas.height;

  // Cracks
  for (const cr of GS.screenCracks) {
    cr.life -= 0.016;
    const alpha = clamp(cr.life / cr.maxLife, 0, 1);
    ctx.save();
    ctx.globalAlpha = alpha * 0.7;
    ctx.strokeStyle = `rgba(255,${Math.floor(200-cr.life*20)},${Math.floor(200-cr.life*20)},1)`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const cx = cr.x * W, cy = cr.y * H;
    for (let i=0;i<3;i++) {
      const a = cr.angle + i*(Math.PI*0.5) + rand(-0.3,0.3);
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(a)*cr.len, cy + Math.sin(a)*cr.len);
    }
    ctx.stroke();
    ctx.restore();
  }
  GS.screenCracks = GS.screenCracks.filter(c=>c.life>0);

  // Red vignette as boss dies
  if (GS.screenDistortion > 0) {
    const vgGrad = ctx.createRadialGradient(W/2,H/2,H*0.3, W/2,H/2,H*0.8);
    vgGrad.addColorStop(0, 'transparent');
    vgGrad.addColorStop(1, `rgba(${Math.floor(200*GS.screenDistortion)},0,0,${GS.screenDistortion*0.6})`);
    ctx.fillStyle = vgGrad;
    ctx.fillRect(0,0,W,H);
  }
}

function renderDimensionalRoom() {
  const W = canvas.width, H = canvas.height;
  const pal = GS.world.palette;

  // Bird's-eye arena background
  const bg = ctx.createRadialGradient(W/2,H/2,50, W/2,H/2,H*0.7);
  bg.addColorStop(0, darken(pal.mid, 0.2));
  bg.addColorStop(0.6, darken(pal.ground, 0.5));
  bg.addColorStop(1, '#000');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // Arena floor tiles
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = pal.accent;
  ctx.lineWidth = 1;
  const tileS = 60;
  for (let x=0;x<W;x+=tileS) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for (let y=0;y<H;y+=tileS) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Arena boundary
  ctx.strokeStyle = pal.accent;
  ctx.lineWidth = 3;
  ctx.shadowColor = pal.accent;
  ctx.shadowBlur = 12;
  ctx.strokeRect(20, 50, W-40, H-80);
  ctx.shadowBlur = 0;

  const dr = GS.dimRoom;

  // Wave counter (hidden during assembly)
  if (dr.phase === 'wave') {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '12px Share Tech Mono, monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`WAVE ${dr.wave+1}/${dr.totalWaves}`, 32, 80);
  }

  // Enemies
  for (const e of dr.enemies) {
    renderEnemy(e);
  }

  // Exit doors (phase=exit)
  if (dr.phase === 'exit') {
    for (const door of dr.exitDoors) {
      ctx.save();
      const pulse = 0.6 + 0.4*Math.sin(GS.levelTimer*3);
      ctx.globalAlpha = pulse;
      ctx.strokeStyle = pal.accent;
      ctx.lineWidth = 3;
      ctx.shadowColor = pal.accent;
      ctx.shadowBlur = 20;
      ctx.strokeRect(door.x, door.y, door.w, door.h);
      const dg = ctx.createLinearGradient(door.x, door.y, door.x, door.y+door.h);
      dg.addColorStop(0, pal.accent+'60');
      dg.addColorStop(1, 'transparent');
      ctx.fillStyle = dg;
      ctx.fillRect(door.x, door.y, door.w, door.h);
      ctx.fillStyle = pal.accent;
      ctx.font = '10px Chakra Petch, sans-serif';
      ctx.textAlign = 'center';
      ctx.shadowBlur = 0;
      ctx.fillText('↑ ENTER', door.x+door.w/2, door.y + door.h + 20);
      ctx.restore();
    }
  }

  // Assembly animation
  if (dr.phase === 'assemble' && dr.assemble) {
    const a = dr.assemble;
    for (const part of a.parts) {
      ctx.save();
      if (a.subPhase === 'hold') {
        ctx.shadowColor = pal.accent;
        ctx.shadowBlur = 20 + Math.sin(GS.levelTimer * 9) * 10;
      } else if (a.subPhase === 'flee') {
        ctx.globalAlpha = Math.max(0.2, 1 - a.timer * 0.6);
      }
      if (part.type === 'head')       drawEnemyHead(ctx, part.x, part.y, part.w, part.h, pal, 0);
      else if (part.type === 'legs')  drawEnemyLegs(ctx, part.x, part.y, part.w, part.h, pal, 0);
      else                            drawEnemyTorso(ctx, part.x, part.y, part.w, part.h, pal, 0);
      ctx.restore();
    }
  }
}

function renderAnnounce() {
  if (GS.announceAlpha <= 0) return;
  const W = canvas.width, H = canvas.height;
  const alpha = clamp(GS.announceAlpha > 1 ? 1 : GS.announceAlpha, 0, 1);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = GS.world.palette.accent;
  ctx.font = `bold ${clamp(Math.floor(W*0.04),18,42)}px Chakra Petch, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = GS.world.palette.accent;
  ctx.shadowBlur = 20;
  ctx.fillText(GS.announceText, W/2, H*0.18);
  ctx.shadowBlur = 0;
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
  GS.announceAlpha -= 0.016;
}

// ── Color Helpers ─────────────────────────────
function darken(hex, amount) {
  return adjustColor(hex, -amount);
}
function lighten(hex, amount) {
  return adjustColor(hex, amount);
}
function adjustColor(hex, amount) {
  try {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    const nr = clamp(Math.round(r*(1+amount)), 0, 255);
    const ng = clamp(Math.round(g*(1+amount)), 0, 255);
    const nb = clamp(Math.round(b*(1+amount)), 0, 255);
    return `rgb(${nr},${ng},${nb})`;
  } catch(e) { return hex; }
}

// ── Timer display ─────────────────────────────
function formatTime(s) {
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// ── Main Game Loop ─────────────────────────────
const TICK = 1000/60;
let lastTime = 0;
let accumulator = 0;
let running = false;

function gameLoop(timestamp) {
  if (!running) return;
  const raw = timestamp - lastTime;
  lastTime = timestamp;
  const dt = Math.min(raw, 100) / 1000;
  accumulator += raw;

  update(dt);
  render();
  clearJust();
  requestAnimationFrame(gameLoop);
}

function update(dt) {
  if (GS.state === 'gameover' || GS.state === 'title') return;

  updateTouchControls();
  GS.levelTimer += dt;
  GS.flashAlpha = Math.max(0, GS.flashAlpha - dt*3);

  // Screen flash update
  const flashEl = document.getElementById('dim-flash');
  flashEl.style.opacity = GS.flashAlpha;

  if (GS.state === 'dimensional') {
    updatePlayerDim(dt);
    updateDimensionalRoom(dt);
    updateBullets(dt);
    updateParticles(dt);
    return;
  }

  if (GS.state === 'transition') {
    updateParticles(dt);
    return;
  }

  if (GS.state === 'boss_cinematic') {
    updateCinematic(dt);
    updateParticles(dt);
    return;
  }

  // Progress world reveal
  if (GS.worldReveal >= 0 && GS.worldReveal < 1) {
    GS.worldReveal = Math.min(1, GS.worldReveal + dt * 0.22);
  }
  // Level name fade-out timer (1.5s, starts once reveal >= 0.7)
  if (GS.worldReveal >= 0.7) {
    GS.worldNameFadeT = Math.min(1.5, GS.worldNameFadeT + dt);
  }

  // Playing / boss
  updatePlayer(dt);
  updateCamera(dt);
  updateEnemies(dt);
  if (GS.bossActive) updateBoss(dt);
  updateParticles(dt);
  updateBullets(dt);
  updateWeaponPickups(dt);
  checkDimDoor(dt);
  checkLevelComplete();
  checkBossWarning();

  // Timer display
  document.getElementById('timer-display').textContent = formatTime(GS.levelTimer);

  updateHUD();
}

function render() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  const pal = GS.world.palette;

  if (GS.state === 'boss_cinematic') {
    renderCinematic();
    return;
  }

  if (GS.state === 'dimensional') {
    renderDimensionalRoom();
    renderPlayer();
    renderBullets();
    renderParticles();
    renderAnnounce();
    return;
  }

  // Side-scroller render
  renderBackground(pal);
  renderFloor();
  renderPlatforms();
  renderDimDoor();

  // Monumental world name in world space — player walks through it
  if (GS.worldReveal >= 0) {
    renderMonumentalText();
  }

  // Enemies
  for (const e of GS.enemies) renderEnemy(e);

  // Boss
  if (GS.bossActive) renderBoss();

  // Player
  renderPlayer();
  renderBullets();
  renderParticles();
  renderScreenDamage();
  renderAnnounce();
  renderPickupPrompt();
  renderGunHUD();

  // World name watermark (HUD layer, fades early)
  const wnd = document.getElementById('world-name-display');
  const wAlpha = Math.max(0, 1 - GS.levelTimer*0.04);
  wnd.style.opacity = wAlpha;

  // Progressive reveal overlay (fade in from black after boss cinematic)
  if (GS.worldReveal >= 0 && GS.worldReveal < 1) {
    const revAlpha = Math.max(0, 1 - GS.worldReveal * 1.25);
    ctx.fillStyle = `rgba(0,0,0,${revAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Weapon pickups render on top of overlay so icons are always visible
  if (GS.worldReveal < 0 || GS.worldReveal >= 0.8) {
    renderWeaponPickups();
  }
}

function renderMonumentalText() {
  const W = canvas.width, H = canvas.height;
  const reveal = GS.worldReveal;

  // Ease-in: smoothstep
  const tIn = clamp((reveal - 0.05) / 0.75, 0, 1);
  const easeIn = tIn * tIn * (3 - 2 * tIn);

  // Ease-out: 1.5s time-based linear fade
  const fadeOut = 1 - clamp(GS.worldNameFadeT / 1.5, 0, 1);

  const alpha = easeIn * fadeOut * 0.38;
  if (alpha <= 0.01) return;

  // Text in world space — player walks through it
  const worldX = 180;
  const sx = worldX - GS.cameraX;
  if (sx < -W * 2 || sx > W * 1.5) return;

  ctx.save();
  ctx.globalAlpha = alpha;
  const fontSize = Math.floor(H * 0.18);
  ctx.font = `${fontSize}px 'Rubik Distressed', sans-serif`;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillStyle = GS.world.palette.accent;
  ctx.fillText(GS.world.name, sx, H * 0.5);
  ctx.restore();
}

// ── Start / Restart ────────────────────────────
function doStart() {
  stopTitleAnim();
  initAudio();
  document.body.classList.remove('at-title');
  document.getElementById('title-screen').classList.add('hidden');
  resetGame();
  GS.state = 'playing';
  running = true;
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}
function doRestart() {
  initAudio();
  document.getElementById('gameover-screen').classList.add('hidden');
  resetGame();
  GS.state = 'playing';
  running = true;
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}
document.getElementById('start-btn').addEventListener('click', doStart);
document.getElementById('start-btn').addEventListener('touchend', e => { e.preventDefault(); doStart(); }, {passive: false});
document.getElementById('restart-btn').addEventListener('click', doRestart);
document.getElementById('restart-btn').addEventListener('touchend', e => { e.preventDefault(); doRestart(); }, {passive: false});

// ── Boss level transition warning ─────────────
function checkBossWarning() {
  if (GS.level % 3 === 2 && GS.distanceTraveled > GS.distanceGoal * 0.7) {
    const bw = document.getElementById('boss-warning');
    const alpha = 0.5 + 0.5*Math.sin(GS.levelTimer*4);
    bw.style.opacity = alpha;
  } else if (GS.level % 3 === 0) {
    const bw = document.getElementById('boss-warning');
    bw.style.opacity = GS.bossActive ? (0.5 + 0.5*Math.sin(GS.levelTimer*6)) : 0;
  } else {
    document.getElementById('boss-warning').style.opacity = 0;
  }
}

// ── Title Screen Animation ─────────────────────
let titleRAF = null;
let titleState = null;

function startTitleAnim() {
  const pal = { accent: '#cc44ff' };
  titleState = {
    t: 0, lastTs: null,
    char: { x: -50, facing: 1, walkPhase: 0, shootTimer: 0.8 },
    bullets: [],
    malbecAlpha: 0,
    staticAlpha: 0,
    staticTimer: rand(4, 7),
    sprite: genSprite(7777, 28, 48, pal),
    noiseCanvas: null,
  };
  titleRAF = requestAnimationFrame(titleFrame);
}

function stopTitleAnim() {
  if (titleRAF) { cancelAnimationFrame(titleRAF); titleRAF = null; }
  titleState = null;
}

function titleFrame(ts) {
  if (!titleState) return;
  titleRAF = requestAnimationFrame(titleFrame);
  const W = canvas.width, H = canvas.height;
  const dt = Math.min(0.05, titleState.lastTs ? (ts - titleState.lastTs) / 1000 : 0.016);
  titleState.lastTs = ts;
  const s = titleState;
  s.t += dt;

  // Background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  const bg = ctx.createRadialGradient(W/2, H * 0.42, 0, W/2, H * 0.42, W * 0.65);
  bg.addColorStop(0, 'rgba(90,0,140,0.55)');
  bg.addColorStop(0.55, 'rgba(40,0,70,0.28)');
  bg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // MALBEC — slow fade in, dual-pass purple+magenta glow
  s.malbecAlpha = Math.min(1, s.malbecAlpha + dt * 0.22);
  const fontSize = Math.min(W * 0.13, 96);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `700 ${fontSize}px 'Chakra Petch', sans-serif`;
  const titleY = H * 0.38;
  // Purple glow
  ctx.globalAlpha = s.malbecAlpha;
  ctx.shadowColor = '#cc44ff';
  ctx.shadowBlur = 45 + 22 * Math.sin(s.t * 1.7);
  ctx.fillStyle = '#ffffff';
  ctx.fillText('MALBEC', W / 2, titleY);
  // Magenta overlay
  ctx.shadowColor = '#ff44cc';
  ctx.shadowBlur = 22 + 12 * Math.sin(s.t * 2.4 + 1.2);
  ctx.globalAlpha = s.malbecAlpha * 0.38;
  ctx.fillStyle = '#ff99ff';
  ctx.fillText('MALBEC', W / 2, titleY);
  // Version
  ctx.globalAlpha = s.malbecAlpha * 0.45;
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#cc88ff';
  ctx.font = "11px 'Share Tech Mono', monospace";
  ctx.fillText('v' + VERSION, W / 2, titleY + Math.floor(fontSize * 0.6) + 14);
  ctx.restore();

  // Floor level for character + bullets
  const floorY = H * 0.80;
  const charW = 28, charH = 48;

  // Character walk
  const c = s.char;
  c.x += 88 * c.facing * dt;
  c.walkPhase += dt * 10;
  if (c.x > W + 60) { c.x = W + 60; c.facing = -1; }
  if (c.x < -60)    { c.x = -60;    c.facing =  1; }
  const bobY = floorY - charH + Math.abs(Math.sin(c.walkPhase)) * 5;

  ctx.save();
  ctx.shadowColor = '#cc44ff';
  ctx.shadowBlur = 12;
  if (c.facing < 0) {
    ctx.translate(c.x + charW, bobY);
    ctx.scale(-1, 1);
    ctx.drawImage(s.sprite, 0, 0, charW, charH);
  } else {
    ctx.drawImage(s.sprite, c.x, bobY, charW, charH);
  }
  ctx.restore();

  // Shoot bouncing bullets
  c.shootTimer -= dt;
  if (c.shootTimer <= 0 && s.bullets.length < 22) {
    c.shootTimer = rand(0.65, 1.3);
    s.bullets.push({
      x: c.x + (c.facing > 0 ? charW + 2 : -4),
      y: bobY + charH * 0.38,
      vx: c.facing * rand(180, 320),
      vy: rand(-220, 60),
      col: Math.random() < 0.55 ? '#cc44ff' : '#ff44cc',
      life: rand(5, 9),
    });
  }

  // Update + draw bullets — pure bounce, no gravity
  for (const b of s.bullets) {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    if (b.x < 5)      { b.x = 5;        b.vx =  Math.abs(b.vx); }
    if (b.x > W - 5)  { b.x = W - 5;    b.vx = -Math.abs(b.vx); }
    if (b.y < 8)      { b.y = 8;        b.vy =  Math.abs(b.vy); }
    if (b.y > floorY) { b.y = floorY;   b.vy = -Math.abs(b.vy); }
    ctx.save();
    ctx.globalAlpha = Math.min(1, b.life * 0.35);
    ctx.shadowColor = b.col;
    ctx.shadowBlur = 16;
    ctx.fillStyle = b.col;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  s.bullets = s.bullets.filter(b => b.life > 0);

  // Static bursts — purple-tinted low-res noise scaled up
  s.staticTimer -= dt;
  if (s.staticTimer <= 0) {
    s.staticAlpha = 0.92;
    s.staticTimer = rand(4, 8);
  }
  if (s.staticAlpha > 0) {
    if (!s.noiseCanvas) {
      s.noiseCanvas = document.createElement('canvas');
      s.noiseCanvas.width = 160;
      s.noiseCanvas.height = 90;
    }
    const nc = s.noiseCanvas.getContext('2d');
    const img = nc.createImageData(160, 90);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.random() * 255;
      d[i]   = Math.floor(v * 0.65);
      d[i+1] = Math.floor(v * 0.05);
      d[i+2] = Math.floor(v * 0.95);
      d[i+3] = Math.floor(s.staticAlpha * 255);
    }
    nc.putImageData(img, 0, 0);
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(s.noiseCanvas, 0, 0, W, H);
    ctx.restore();
    s.staticAlpha = Math.max(0, s.staticAlpha - dt * 3.5);
  }
}

// On load: fonts ready — preload Orbitron then start title animation
document.fonts.ready.then(() => {
  document.fonts.load("900 48px 'Orbitron'").finally(() => {
    startTitleAnim();
  });
});

</script>
<script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  var scrollRaf=0;
  function emitScroll(){
    scrollRaf=0;
    var x=window.scrollX||window.pageXOffset||0;
    var y=window.scrollY||window.pageYOffset||0;
    window.parent.postMessage({type:'INLINE_EDIT_SCROLL',scrollX:x,scrollY:y},'*');
  }
  window.addEventListener('scroll',function(){
    if(scrollRaf)return;
    scrollRaf=requestAnimationFrame(emitScroll);
  },{passive:true,capture:true});
  emitScroll();
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
